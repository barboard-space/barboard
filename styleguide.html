<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Barboard 设计标准（已确认）· Styleguide</title>
  <meta name="robots" content="noindex" />
  <link rel="stylesheet" href="fonts.css" />
  <link rel="stylesheet" href="style.css?v=3.0.3" />
  <style>
    /* ===== styleguide 布局（sg- 前缀，勿与站点 class 冲突）===== */
    body { padding: 40px 0 120px; }
    .sg-wrap { max-width: 980px; margin: 0 auto; padding: 0 24px; }
    .sg-head { margin-bottom: 48px; }
    .sg-head h1 { font-family: var(--font-display); font-size: 48px; letter-spacing: 0.02em; color: var(--clr-text); }
    .sg-head p { color: var(--clr-text-2); font-size: 14px; line-height: 1.7; margin-top: 8px; max-width: 680px; }
    .sg-head code { font-family: var(--font-mono); font-size: 12px; color: var(--clr-violet-light); background: var(--clr-surface); padding: 1px 6px; border-radius: 3px; }

    .sg-cat { margin-top: 64px; }
    .sg-cat__title {
      font-family: var(--font-display); font-size: 13px; letter-spacing: 0.28em; text-transform: uppercase;
      color: var(--clr-violet-light); border-bottom: 1px solid var(--clr-border-2); padding-bottom: 10px; margin-bottom: 28px;
    }
    .sg-item { margin-bottom: 36px; }
    .sg-item__bar {
      display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap;
      margin-bottom: 14px; padding-bottom: 6px; border-bottom: 1px dashed var(--clr-border);
    }
    .sg-item__name { font-size: 14px; font-weight: 600; color: var(--clr-text); }
    .sg-item__cls  { font-family: var(--font-mono); font-size: 12px; color: var(--clr-accent-light); }
    .sg-item__src  { font-family: var(--font-mono); font-size: 11px; color: var(--clr-text-3); margin-left: auto; }
    .sg-note { font-size: 12px; color: var(--clr-text-3); line-height: 1.6; margin-top: 8px; }
    .sg-demo { padding: 8px 0; }
    .sg-demo--panel { background: var(--clr-bg-2); border: 1px solid var(--clr-border); border-radius: 8px; padding: 20px; }

    .sg-empty {
      border: 1px dashed var(--clr-border-2); border-radius: 8px; padding: 40px;
      text-align: center; color: var(--clr-text-3); font-size: 13px; line-height: 1.8;
    }
  </style>
</head>
<body>
<div class="sg-wrap">

  <div class="sg-head">
    <h1>BARBOARD 设计标准</h1>
    <p>
      <strong>已确认的设计标准</strong>展示页（<code>noindex</code>、不进导航）——只收录逐个精修、确认定稿的令牌/组件/规格，作为全站权威基准与视觉回归参考。
      规则与说明见 <code>DESIGN.md</code>；全量自动渲染的草稿底稿见 <code>styleguide-draft.html</code>。
    </p>
  </div>

  <!-- ↓↓↓ 确认项逐个搬入此处 ↓↓↓ -->

  <div class="sg-empty">
    待搬入确认项。<br>
    每确认一项（令牌 / 组件 / 规格），就以一个 <code style="font-family:var(--font-mono)">.sg-cat</code> 或 <code style="font-family:var(--font-mono)">.sg-item</code> 加入这里。
  </div>

  <!-- ↑↑↑ 确认项逐个搬入此处 ↑↑↑ -->

</div>
</body>
</html>

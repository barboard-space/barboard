<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>威妈 · @williw_ | Barboard 成员</title>
  <meta name="description" content="Barboard 成员主页 — 威妈 (@williw_)" />
  <meta name="member-nickname" content="威妈" />
  <link rel="icon" type="image/png" href="../assets/images/logo_center.png" />
  <link rel="stylesheet" href="../fonts.css" />
  <link rel="stylesheet" href="../style.css" />
  <style>
    /* ── Member hero ── */
    .mp-hero {
      padding: calc(var(--nav-h) + 56px) 0 64px;
      position: relative;
      overflow: hidden;
    }
    .mp-hero__glow {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 60% at 30% 0%, rgba(168,85,247,0.18) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 80% 80%, rgba(0,180,255,0.07) 0%, transparent 55%);
      pointer-events: none;
    }
    .mp-hero__inner { position: relative; z-index: 1; }

    /* Breadcrumb */
    .breadcrumb {
      font-size: 12px;
      color: var(--clr-text-3);
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 40px;
    }
    .breadcrumb a { color: var(--clr-text-3); transition: color 0.2s; }
    .breadcrumb a:hover { color: var(--clr-text-2); }
    .breadcrumb__sep { opacity: 0.35; }

    /* Profile card */
    .mp-card {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 40px;
      align-items: start;
    }

    /* Avatar */
    .mp-avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      overflow: hidden;
      border: 2px solid var(--clr-border-2);
      background: var(--clr-surface-2);
      flex-shrink: 0;
      position: relative;
    }
    .mp-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .mp-avatar__placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-size: 48px;
      color: var(--clr-violet-light);
      background: linear-gradient(135deg, var(--clr-surface) 0%, var(--clr-surface-2) 100%);
      letter-spacing: 0;
    }
    .mp-avatar__ring {
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--clr-violet), var(--clr-accent));
      z-index: -1;
      opacity: 0.6;
    }

    /* Info */
    .mp-info { padding-top: 8px; }

    .mp-id {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--clr-text-3);
      letter-spacing: 0.18em;
      margin-bottom: 8px;
    }

    .mp-nickname {
      font-family: var(--font-display);
      font-size: 48px;
      line-height: 1;
      color: var(--clr-text);
      letter-spacing: 0.04em;
      margin-bottom: 6px;
    }

    .mp-handle {
      font-size: 15px;
      color: var(--clr-text-2);
      margin-bottom: 20px;
    }

    /* Tags */
    .mp-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 24px;
    }
    .mp-tag {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 4px;
      border: 1px solid var(--clr-border-2);
      color: var(--clr-text-2);
      background: var(--clr-surface);
    }
    .mp-tag--violet {
      border-color: rgba(168,85,247,0.4);
      color: var(--clr-violet-light);
      background: rgba(168,85,247,0.08);
    }

    /* External links */
    .mp-links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .mp-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 500;
      color: var(--clr-text-2);
      padding: 7px 14px;
      border-radius: 6px;
      border: 1px solid var(--clr-border);
      background: var(--clr-surface);
      text-decoration: none;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }
    .mp-link:hover {
      border-color: var(--clr-border-2);
      color: var(--clr-text);
      background: var(--clr-surface-2);
    }

    /* ── Charts section ── */
    .mp-section {
      padding: 56px 0 64px;
      border-top: 1px solid var(--clr-border);
    }

    .mp-section-label {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--clr-violet-light);
      margin-bottom: 12px;
    }

    .mp-section-title {
      font-family: var(--font-display);
      font-size: 28px;
      letter-spacing: 0.06em;
      color: var(--clr-text);
      margin-bottom: 28px;
    }

    .mp-works-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }

    .mp-work-card {
      background: var(--clr-surface);
      border: 1px solid var(--clr-border);
      border-radius: 8px;
      padding: 20px;
      text-decoration: none;
      display: block;
      transition: border-color 0.2s, background 0.2s;
    }
    .mp-work-card:hover {
      border-color: var(--clr-border-2);
      background: var(--clr-surface-2);
    }
    .mp-work-card__type {
      font-size: 10px;
      font-family: var(--font-mono);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--clr-text-3);
      margin-bottom: 8px;
    }
    .mp-work-card__title {
      font-size: 15px;
      font-weight: 600;
      color: var(--clr-text);
      margin-bottom: 4px;
    }
    .mp-work-card__desc {
      font-size: 12px;
      color: var(--clr-text-2);
      line-height: 1.5;
    }

    /* placeholder / todo state */
    .mp-todo {
      font-size: 13px;
      color: var(--clr-text-3);
      padding: 32px;
      border: 1px dashed var(--clr-border);
      border-radius: 8px;
      text-align: center;
    }

    /* ── Mobile ── */
    @media (max-width: 600px) {
      .mp-card {
        grid-template-columns: 1fr;
        gap: 24px;
      }
      .mp-avatar {
        width: 96px;
        height: 96px;
      }
      .mp-avatar__placeholder { font-size: 38px; }
      .mp-nickname { font-size: 36px; }
    }
  </style>
</head>
<body>

      </div>

    </div>
  </section>

  <!-- 代表榜单 -->
  <section class="mp-section">
    <div class="section__inner">
      <div class="mp-section-label">Works</div>

  <div id="site-footer"></div>
  <script src="../scripts/nav.js"></script>
  <script>
    if ('IntersectionObserver' in window) {
      const obs = new IntersectionObserver((entries) => {
        entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); } });
      }, { threshold: 0.08 });
      document.querySelectorAll('.fade-up').forEach(el => obs.observe(el));
    } else {
      document.querySelectorAll('.fade-up').forEach(el => el.classList.add('visible'));
    }
  </script>

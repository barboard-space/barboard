<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script>if(sessionStorage.getItem('barboard_dev')!=='1')document.documentElement.style.visibility='hidden'</script>
  <title>Barvision Hall of Fame | Barboard</title>
  <meta name="description" content="Barvision 荣誉殿堂——吧视先锋奖、历届数据纪录与特别奖项，记录 Barvision 年度歌曲大赛的高光时刻。" />
  <link rel="icon" type="image/png" href="../assets/images/logo_center.png" />
  <link rel="stylesheet" href="../fonts.css" />
  <link rel="stylesheet" href="../style.css" />
  <style>
    /* ── Page hero ── */
    .hof-hero {
      position: relative;
      padding: var(--nav-h) 0 72px;
      overflow: hidden;
    }
    .hof-hero__glow {
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%,  rgba(212,168,50,0.22)  0%, transparent 60%),
        radial-gradient(ellipse 45% 45% at 0%  95%, rgba(168,85,247,0.08)  0%, transparent 55%),
        radial-gradient(ellipse 30% 30% at 100% 40%,rgba(0,180,255,0.05)   0%, transparent 50%);
      pointer-events: none;
    }
    .hof-hero__grid {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
    }
    .hof-hero__watermark {
      position: absolute;
      right: -10px;
      bottom: -10px;
      font-family: var(--font-display);
      font-size: 200px;
      line-height: 1;
      letter-spacing: -0.02em;
      color: rgba(212,168,50,0.035);
      pointer-events: none;
      user-select: none;
    }
    .hof-hero__inner { position: relative; z-index: 2; margin-top: 40px; }
    .hof-eyebrow {
      font-size: 11px; font-weight: 600; letter-spacing: 0.32em;
      text-transform: uppercase; color: var(--clr-gold-light);
      text-shadow: 0 0 10px rgba(245,200,64,0.7), 0 0 32px rgba(245,200,64,0.28);
      margin-bottom: 24px;
      display: inline-flex; align-items: center; gap: 8px;
      transition: color 0.2s;
    }
    .hof-eyebrow:hover { color: var(--clr-white); text-decoration: none; }
    .hof-title {
      font-family: var(--font-display);
      font-size: clamp(56px, 8vw, 108px);
      line-height: 1; letter-spacing: 0.02em; text-transform: uppercase;
    }
    .bv-accent { color: var(--clr-violet-light); }
    .hof-title .bv-accent { color: var(--clr-gold-light); }
    .hof-desc {
      font-size: 15px; color: rgba(245,200,64,0.85); line-height: 1.7;
      margin-top: 24px; max-width: 560px;
    }

    /* ── Section header spacing ── */
    .section--bordered .section-label { margin-bottom: 16px; }
    .section--bordered .section__title { margin-top: 24px; }

    /* ── Pioneer ── */
    .bv-pioneer {
      background: linear-gradient(135deg, rgba(168,85,247,0.11) 0%, rgba(224,64,160,0.05) 100%);
      border: 1px solid rgba(168,85,247,0.28);
      border-radius: 8px; padding: 28px 32px;
      display: flex; align-items: center; gap: 24px;
      position: relative; overflow: hidden;
      margin-top: var(--gap-md);
    }
    .bv-pioneer::after {
      content: '🎖️'; position: absolute; right: 28px; top: 50%;
      transform: translateY(-50%); font-size: 80px; opacity: 0.1;
      pointer-events: none; user-select: none;
    }
    .bv-pioneer__name {
      font-family: var(--font-display); font-size: 34px; line-height: 1; color: var(--clr-text);
    }
    .bv-pioneer__desc {
      font-size: 13px; color: var(--clr-text-2); line-height: 1.65;
      margin-top: 16px; max-width: 620px;
    }

    /* ── 版本分组：常规版 = 粉色 / 娱乐版 = 紫色（用 --bv-accent 贯穿该组卡片）── */
    .bv-group--regular   { --bv-accent: var(--clr-pink-light);   --bv-glow: rgba(240,96,184,0.30); }
    .bv-group--unplugged { --bv-accent: var(--clr-violet-light); --bv-glow: rgba(192,132,252,0.30); }
    .bv-ver {
      font-size: 12px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--bv-accent, var(--clr-text-2)); margin: var(--gap-md) 0 12px;
      display: flex; align-items: center; gap: 12px;
    }
    .bv-ver::after { content: ''; flex: 1; height: 1px; background: var(--clr-border-2); }

    /* ── 卡片网格 ── */
    .bv-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px; }
    .bv-card {
      background: var(--clr-surface); border: 1px solid var(--clr-border);
      border-radius: 8px; padding: 16px 18px;
      transition: border-color 0.2s, opacity 0.5s ease, transform 0.5s ease;
    }
    .bv-card:hover { border-color: var(--clr-border-2); }
    .bv-card__label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase;
      color: var(--clr-text-2); margin-bottom: 8px;
    }
    .bv-card__head { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
    .bv-card__val {
      font-family: var(--font-display); font-size: 32px; line-height: 1;
      color: var(--bv-accent, var(--clr-violet-light)); text-shadow: 0 0 18px var(--bv-glow, transparent);
    }
    .bv-card__who { font-size: 13px; font-weight: 600; color: var(--clr-text); }
    .bv-card__sub { font-size: 12px; color: var(--clr-text-2); margin-top: 8px; line-height: 1.6; }
    .bv-card__title  { font-size: 14px; font-weight: 700; color: var(--bv-accent, var(--clr-violet-light)); }
    .bv-card__metric { font-size: 11px; color: var(--clr-text-2); margin-top: 3px; }
    .bv-card__aval   { color: var(--clr-text); font-weight: 600; }

    /* ── 条目 ── */
    .bv-card__entries {
      margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--clr-border-2);
      display: flex; flex-direction: column; gap: 7px;
    }
    .bv-entry { display: flex; align-items: baseline; gap: 10px; font-size: 12px; line-height: 1.5; }
    .bv-entry__l { flex: 1; min-width: 0; display: flex; flex-wrap: wrap; align-items: baseline; gap: 4px 8px; }
    .bv-entry__r { flex-shrink: 0; display: flex; align-items: center; gap: 6px; }
    .bv-entry__val    { font-family: var(--font-mono); color: var(--bv-accent, var(--clr-violet-light)); }
    .bv-entry__song   { color: var(--clr-text-2); }
    .bv-entry__detail { color: var(--clr-text-2); }
    .bv-session {
      font-family: var(--font-mono); font-size: 10px; color: var(--clr-text-2);
      border: 1px solid var(--clr-border-2); border-radius: 3px; padding: 1px 6px; white-space: nowrap;
    }
    .bv-entry--old { opacity: 0.6; }
    .bv-entry--old .bv-entry__song,
    .bv-entry--old .bv-entry__val { text-decoration: line-through; text-decoration-color: var(--clr-text-3); }
    .bv-old-tag {
      font-size: 9px; color: var(--clr-text-2); border: 1px solid var(--clr-border-2);
      border-radius: 2px; padding: 0 4px; letter-spacing: 0.05em;
    }

    /* ── 场次代码图例 ── */
    .bv-legend { font-size: 11px; color: var(--clr-text-3); line-height: 1.8; margin-top: 12px; }
    .bv-legend code {
      font-family: var(--font-mono); color: var(--clr-text-2);
      background: var(--clr-surface); padding: 0 5px; border-radius: 3px; margin: 0 1px;
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .bv-grid { grid-template-columns: 1fr; }
      .bv-pioneer      { flex-direction: column; align-items: flex-start; }
      .bv-pioneer::after { display: none; }
    }
    @media (hover: none), (pointer: coarse) {
      .bv-card:hover { border-color: var(--clr-border); }
    }

    /* ── Page TOC ── */
    .hof-toc {
      position: fixed; right: 19px; bottom: 90px; z-index: 90;
      display: flex; flex-direction: column; gap: 1px;
      opacity: 0; visibility: hidden;
      transition: opacity 0.25s, visibility 0.25s;
    }
    .hof-toc--visible { opacity: 1; visibility: visible; }
    .hof-toc__item {
      font-family: var(--font-body); font-size: 11px;
      color: var(--clr-text-3); cursor: pointer;
      padding: 3px 13px 3px 0; position: relative;
      transition: color 0.15s;
      line-height: 1.5; white-space: nowrap; user-select: none;
      text-align: right;
    }
    .hof-toc__item::after {
      content: ''; position: absolute; right: 3px; top: 50%;
      transform: translateY(-50%); width: 5px; height: 5px;
      border-radius: 50%; background: var(--clr-violet-light);
      opacity: 0; transition: opacity 0.2s;
    }
    .hof-toc__item:not(.hof-toc__item--active):hover { color: var(--clr-text); }
    .hof-toc__item--active { color: var(--clr-violet-light); }
    .hof-toc__item--active::after { opacity: 1; animation: toc-breathe 3s ease-in-out infinite; }
    @keyframes toc-breathe {
      0%, 100% { opacity: 1; transform: translateY(-50%) scale(1); }
      50%       { opacity: 0.35; transform: translateY(-50%) scale(0.65); }
    }
    @media (max-width: 768px) { .hof-toc { display: none; } }
  </style>
</head>
<body>
<div id="site-nav"></div>

<!-- ═══ HERO ═══ -->
<section class="hof-hero">
  <div class="hof-hero__glow" aria-hidden="true"></div>
  <div class="hof-hero__grid" aria-hidden="true"></div>
  <div class="hof-hero__watermark" aria-hidden="true">BARVISION</div>
  <div class="hof-hero__inner section__inner">

    <a class="hof-eyebrow fade-up" href="/barvision.html"><span>←</span><span>Barvision</span></a>
    <h1 class="hof-title fade-up" style="transition-delay:0.1s;">Hall <span style="opacity:0.65;">of</span> <span class="bv-accent">Fame</span></h1>
    <p class="hof-desc fade-up" style="transition-delay:0.2s;">记录 Barvision 年度歌曲大赛历届的高光时刻。</p>

  </div>
</section>

<!-- ═══ 吧视先锋奖 ═══ -->
<section class="section section--bordered" id="pioneer" style="scroll-margin-top:calc(var(--nav-h) - 2px)">
  <div class="section__inner">

    <p class="section-label fade-up">吧视先锋奖</p>
    <h2 class="section__title fade-up" style="transition-delay:0.1s;font-size:clamp(18px,2.4vw,36px);">Pioneer <span class="bv-accent">Award</span></h2>

    <div id="bvPioneer" class="fade-up" style="transition-delay:0.2s;"></div>

  </div>
</section>

<!-- ═══ 赛季纪录 ═══ -->
<section class="section section--bordered" id="season" style="scroll-margin-top:calc(var(--nav-h) - 2px)">
  <div class="section__inner">

    <p class="section-label fade-up">赛季纪录</p>
    <h2 class="section__title fade-up" style="transition-delay:0.1s;font-size:clamp(18px,2.4vw,36px);">Season <span class="bv-accent">Records</span></h2>
    <div id="bvSeasonGrid"></div>

  </div>
</section>

<!-- ═══ 数据纪录 ═══ -->
<section class="section section--bordered" id="records" style="scroll-margin-top:calc(var(--nav-h) - 2px)">
  <div class="section__inner">

    <p class="section-label fade-up">数据纪录</p>
    <h2 class="section__title fade-up" style="transition-delay:0.1s;font-size:clamp(18px,2.4vw,36px);">Category <span class="bv-accent">Records</span></h2>
    <p class="bv-legend fade-up" style="transition-delay:0.15s;">场次代码：<code>A</code> 小众 · <code>B</code> 中众 · <code>C</code> 大众 · <code>SF</code> 半决赛 · <code>GF</code> 决赛 · <code>E</code> 娱乐版（如 <code>7A</code> = 第 7 届小众组）。<span style="opacity:0.7;">划线条目为已被刷新的旧纪录。</span></p>
    <div id="bvRecordsGrid"></div>

  </div>
</section>

<!-- ═══ 特别奖项 ═══ -->
<section class="section section--bordered" id="awards" style="scroll-margin-top:calc(var(--nav-h) - 2px)">
  <div class="section__inner">

    <p class="section-label fade-up">特别奖项</p>
    <h2 class="section__title fade-up" style="transition-delay:0.1s;font-size:clamp(18px,2.4vw,36px);">Special <span class="bv-accent">Awards</span></h2>
    <div id="bvAwardsGrid"></div>

  </div>
</section>

<nav id="bvHofToc" class="hof-toc" aria-label="页内目录">
  <div class="hof-toc__item" data-target="pioneer">吧视先锋奖</div>
  <div class="hof-toc__item" data-target="season">赛季纪录</div>
  <div class="hof-toc__item" data-target="records">数据纪录</div>
  <div class="hof-toc__item" data-target="awards">特别奖项</div>
</nav>

<div id="site-footer"></div>
<script src="../scripts/nav.js"></script>
<script>
  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  const MEMBER_MAP = {
    '威妈': { id:7,   handle:'williw_' },
    '锴妈': { id:12,  handle:'WillKris锴' },
    '雨妈': { id:17,  handle:'Lee翼雨' },
    '猴妈': { id:18,  handle:'Voiiz' },
    '柠妈': { id:19,  handle:'LemonSheeran' },
    '包妈': { id:20,  handle:'Jeremy_BAg' },
    'S妈':  { id:27,  handle:'哈哈哈时光机' },
    '羊妈': { id:100, handle:'SeafishYANG' },
    '城妈': { id:120, handle:'MarekTotti' },
    '萌妈': { id:125, handle:'绿荫夏语' },
    '麦妈': { id:130, handle:'Tandiny' },
    '泰妈': { id:131, handle:'泰坦crazy' },
    'A妈':  { id:132, handle:'AloneAlien_' },
    '瑞妈': { id:135, handle:'Jefferyat19' },
    '草妈': { id:141, handle:'Twentee' },
    '小妈': { id:153, handle:'Jeoli音乐' },
    '布妈': { id:157, handle:'Vivienne-Eliza' },
    '田妈': { id:295, handle:'FREEMAN' },
    '院妈': { id:326, handle:'天神院院长' },
    '洛妈': { id:124, handle:'Lolo_sara' },
    '嘟妈': { id:190, handle:'DDDDDope' },
  };
  function fmtMember(nickname) {
    var m = MEMBER_MAP[nickname.trim()];
    if (!m) return esc(nickname);
    return '<a class="member" href="../member/' + m.id + '.html" data-nickname="' + esc(nickname) + '">@' + esc(m.handle) + '</a>';
  }
  function fmtWho(who) {
    return who.split(' · ').map(fmtMember).join('<span style="opacity:0.35"> · </span>');
  }

  function buildPioneer(p) {
    var el = document.getElementById('bvPioneer');
    if (!el) return;
    var href = '../member/' + p.member_id + '.html';
    var nameLink = '<a class="member" href="' + href + '" data-nickname="' + esc(p.nickname) + '" style="color:var(--clr-text);">@' + esc(p.handle) + '</a>';
    var descHtml = esc(p.desc).replace('@' + esc(p.handle),
      '<a class="member" href="' + href + '" data-nickname="' + esc(p.nickname) + '">@' + esc(p.handle) + '</a>');
    el.innerHTML = '<div class="bv-pioneer">' +
      '<div><div class="bv-pioneer__name">' + nameLink + '</div>' +
      '<p class="bv-pioneer__desc">' + descHtml + '</p></div>' +
      '</div>';
  }

  function sessionBadge(s) { return s ? '<span class="bv-session">' + esc(s) + '</span>' : ''; }

  function renderEntry(e) {
    var l = '';
    if (e.who)    l += '<span class="bv-entry__who">' + fmtMember(e.who) + '</span>';
    if (e.val)    l += '<span class="bv-entry__val">' + esc(e.val) + '</span>';
    if (e.song)   l += '<span class="bv-entry__song">' + esc(e.song) + '</span>';
    if (e.detail) l += '<span class="bv-entry__detail">' + esc(e.detail) + '</span>';
    var r = (e.old ? '<span class="bv-old-tag">旧</span>' : '') + sessionBadge(e.session);
    return '<div class="bv-entry' + (e.old ? ' bv-entry--old' : '') + '">' +
      '<span class="bv-entry__l">' + l + '</span>' +
      (r ? '<span class="bv-entry__r">' + r + '</span>' : '') + '</div>';
  }

  function renderRecordCard(r, i) {
    var entries = (r.entries || []).slice();
    var subs = [];
    if (r.edition) subs.push(esc(r.edition) + (r.session ? ' ' + sessionBadge(r.session) : ''));
    else if (r.song) entries.unshift({ song: r.song, session: r.session });
    else if (r.session) subs.push(sessionBadge(r.session));
    return '<div class="bv-card fade-up" style="transition-delay:' + (i * 0.05).toFixed(2) + 's;">' +
      '<div class="bv-card__label">' + esc(r.label) + '</div>' +
      '<div class="bv-card__head"><span class="bv-card__val">' + esc(r.val) + '</span>' +
        (r.who ? '<span class="bv-card__who">' + fmtWho(r.who) + '</span>' : '') + '</div>' +
      (subs.length ? '<div class="bv-card__sub">' + subs.join(' · ') + '</div>' : '') +
      (entries.length ? '<div class="bv-card__entries">' + entries.map(renderEntry).join('') + '</div>' : '') +
    '</div>';
  }

  function renderAwardCard(a, i) {
    return '<div class="bv-card fade-up" style="transition-delay:' + (i * 0.05).toFixed(2) + 's;">' +
      '<div class="bv-card__title">' + esc(a.title) + '</div>' +
      '<div class="bv-card__metric">' + esc(a.metric) + (a.val ? ' · <span class="bv-card__aval">' + esc(a.val) + '</span>' : '') + '</div>' +
      ((a.entries && a.entries.length) ? '<div class="bv-card__entries">' + a.entries.map(renderEntry).join('') + '</div>' : '') +
    '</div>';
  }

  var VERSIONS = [['常规版', 'regular'], ['娱乐版', 'unplugged']];
  function buildVersioned(containerId, data, renderFn) {
    var el = document.getElementById(containerId);
    if (!el || !data) return;
    var html = '';
    VERSIONS.forEach(function(v) {
      var arr = data[v[1]];
      if (!arr || !arr.length) return;
      html += '<div class="bv-group bv-group--' + v[1] + '">' +
        '<div class="bv-ver">' + v[0] + '</div>' +
        '<div class="bv-grid">' + arr.map(renderFn).join('') + '</div>' +
        '</div>';
    });
    el.innerHTML = html;
  }

  /* ─── async data load + render ─────────────────────────────────────── */
  (async function() {
    var d;
    try {
      d = await fetch('../data/barvision/bv_hof_data.json').then(function(r) { return r.json(); });
    } catch(e) {
      console.error('BV HOF: data load failed', e);
      return;
    }
    buildPioneer(d.pioneer);
    buildVersioned('bvSeasonGrid',  d.season,       renderRecordCard);
    buildVersioned('bvRecordsGrid', d.records,      renderRecordCard);
    buildVersioned('bvAwardsGrid',  d.achievements, renderAwardCard);

    function clearDelayAfterAnim(el) {
      var ms = (parseFloat(el.style.transitionDelay) || 0) * 1000 + 250;
      setTimeout(function() { el.style.transitionDelay = '0s'; }, ms);
    }
    if ('IntersectionObserver' in window) {
      var fadeObserver = new IntersectionObserver(function(entries) {
        entries.forEach(function(e) {
          if (e.isIntersecting) {
            e.target.classList.add('visible');
            fadeObserver.unobserve(e.target);
            clearDelayAfterAnim(e.target);
          }
        });
      }, { threshold: 0.08 });
      document.querySelectorAll('.fade-up').forEach(function(el) { fadeObserver.observe(el); });
    } else {
      document.querySelectorAll('.fade-up').forEach(function(el) { el.classList.add('visible'); });
    }
  })();

  /* ── TOC ── */
  (function() {
    var toc = document.getElementById('bvHofToc');
    var items = Array.from(toc.querySelectorAll('.hof-toc__item'));
    var navH = 72;
    var suppressIO = false;
    var suppressTimer = null;

    window.addEventListener('scroll', function() {
      toc.classList.toggle('hof-toc--visible', window.scrollY > 400);
      if (suppressIO) {
        clearTimeout(suppressTimer);
        suppressTimer = setTimeout(function() { suppressIO = false; }, 200);
      }
    }, { passive: true });

    var obs = new IntersectionObserver(function(entries) {
      if (suppressIO) return;
      entries.forEach(function(e) {
        if (e.isIntersecting)
          items.forEach(function(it) { it.classList.toggle('hof-toc__item--active', it.dataset.target === e.target.id); });
      });
    }, { rootMargin: '-' + navH + 'px 0px -55% 0px' });

    items.forEach(function(item) {
      var el = document.getElementById(item.dataset.target);
      if (el) obs.observe(el);
      item.addEventListener('click', function() {
        var el = document.getElementById(item.dataset.target);
        if (!el) return;
        suppressIO = true;
        clearTimeout(suppressTimer);
        items.forEach(function(it) { it.classList.toggle('hof-toc__item--active', it === item); });
        window.scrollTo({ top: el.getBoundingClientRect().top + window.scrollY - navH + 2, behavior: 'smooth' });
      });
    });
  })();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script>if(sessionStorage.getItem('barboard_dev')!=='1')document.documentElement.style.visibility='hidden'</script>
  <title>Barvision Stats | Barboard</title>
  <meta name="description" content="Barvision 数据中心——历届成绩总览、大妈选送排行榜与按成员 / 歌手 / 歌曲 / 语种的大数据查询（数据截至第 15 届）。" />
  <link rel="icon" type="image/png" href="/assets/images/logo_center.png" />
  <link rel="stylesheet" href="/fonts.css" />
  <link rel="stylesheet" href="/style.css" />
  <style>
    /* ── Hero（电蓝 / 紫 数据主题） ── */
    .st-hero { position: relative; padding: var(--nav-h) 0 64px; overflow: hidden; }
    .st-hero__glow {
      position: absolute; inset: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%,  rgba(0,180,255,0.16) 0%, transparent 60%),
        radial-gradient(ellipse 50% 50% at 100% 10%,rgba(168,85,247,0.13) 0%, transparent 55%),
        radial-gradient(ellipse 40% 40% at 0% 90%,  rgba(240,96,184,0.05) 0%, transparent 50%);
    }
    .st-hero__grid {
      position: absolute; inset: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);
      background-size: 48px 48px;
    }
    .st-hero__watermark {
      position: absolute; right: -10px; bottom: -10px;
      font-family: var(--font-display); font-size: 200px; line-height: 1; letter-spacing: -0.02em;
      color: rgba(0,180,255,0.035); pointer-events: none; user-select: none;
    }
    .st-hero__inner { position: relative; z-index: 2; margin-top: 40px; }
    .st-eyebrow {
      font-size: 11px; font-weight: 600; letter-spacing: 0.32em; text-transform: uppercase;
      color: var(--clr-violet-light); text-shadow: 0 0 10px rgba(192,132,252,0.6);
      margin-bottom: 24px; display: inline-flex; align-items: center; gap: 8px; transition: color 0.2s;
    }
    .st-eyebrow:hover { color: var(--clr-white); text-decoration: none; }
    .st-title { font-family: var(--font-display); font-size: clamp(56px, 8vw, 108px); line-height: 1; letter-spacing: 0.02em; text-transform: uppercase; }
    .st-title .ac { color: var(--clr-violet-light); }
    .st-desc { font-size: 15px; color: var(--clr-text-2); line-height: 1.7; margin-top: 24px; max-width: 580px; }
    .st-through {
      display: inline-block; margin-top: 20px; font-family: var(--font-body); font-size: 11px; font-weight: 600; letter-spacing: 0.12em;
      color: var(--clr-violet-light); border: 1px solid rgba(168,85,247,0.35); border-radius: 999px; padding: 5px 14px; background: rgba(168,85,247,0.06);
    }

    .section--bordered .section-label { margin-bottom: 16px; }
    .section--bordered .section__title { margin-top: 24px; }
    .st-sec__sub { font-size: 13px; color: var(--clr-text-2); margin-top: 14px; max-width: 660px; line-height: 1.7; }

    /* ── 通用表 ── */
    .st-wrap { margin-top: var(--gap-md); overflow-x: auto; scrollbar-width: thin; }
    .st-tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
    .st-tbl th, .st-tbl td { text-align: left; padding: 9px 12px; border-bottom: 1px solid var(--clr-border); white-space: nowrap; }
    .st-tbl thead th {
      font-size: 10.5px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--clr-text-3); border-bottom: 1px solid var(--clr-border-2);
    }
    .st-tbl tbody tr { transition: background 0.15s; }
    .st-tbl tbody tr:hover { background: rgba(255,255,255,0.022); }
    .st-tbl .num { text-align: right; font-family: var(--font-mono); }
    .st-tbl .ctr { text-align: center; font-family: var(--font-mono); }
    .st-no { font-family: var(--font-display); font-size: 18px; color: var(--clr-violet-light); }
    .st-song .art { color: var(--clr-text-3); }
    .st-song .ttl { color: var(--clr-text); }
    .st-muted { color: var(--clr-text-3); }
    .st-fmt { font-size: 11px; border: 1px solid var(--clr-border-2); border-radius: 3px; padding: 1px 7px; color: var(--clr-text-2); }
    .st-badge { font-family: var(--font-mono); font-size: 10px; color: var(--clr-text-3); border: 1px solid var(--clr-border-2); border-radius: 3px; padding: 1px 6px; }

    /* 排行榜可排序表头 */
    .st-tbl th.sortable { cursor: pointer; user-select: none; }
    .st-tbl th.sortable:hover { color: var(--clr-text-2); }
    .st-tbl th.num.sortable, .st-tbl th.ctr.sortable { text-align: right; }
    .st-sort-ar { display: inline-block; width: 0; opacity: 0; margin-left: 4px; transition: opacity 0.15s; color: var(--clr-violet-light); }
    .st-tbl th.is-sorted .st-sort-ar { width: auto; opacity: 1; }
    .st-rk-medal--1 { color: var(--clr-gold-light); }
    .st-rk-medal--2 { color: var(--clr-silver); }
    .st-rk-medal--3 { color: var(--clr-bronze); }
    .st-best--1 { color: var(--clr-gold-light); }
    .st-best--2 { color: var(--clr-silver); }
    .st-best--3 { color: var(--clr-bronze); }
    /* 排行榜 # 序号列 */
    .st-tbl .st-pos { font-family: var(--font-display); font-size: 16px; color: var(--clr-text-3); text-align: center; width: 1px; }
    .st-tbl .st-pos--1 { color: var(--clr-gold-light); }
    .st-tbl .st-pos--2 { color: var(--clr-silver); }
    .st-tbl .st-pos--3 { color: var(--clr-bronze); }
    /* 当前排序数值列的迷你条形（衬于单元格背景） */
    .st-tbl td.st-bar { position: relative; }
    .st-tbl td.st-bar > span { position: relative; z-index: 1; }
    .st-tbl td.st-bar::before {
      content: ''; position: absolute; top: 4px; bottom: 4px; left: 0; width: var(--bar, 0%);
      background: linear-gradient(90deg, rgba(168,85,247,0.04), rgba(168,85,247,0.20));
      border-radius: 2px; transition: width 0.3s ease;
    }
    /* 赛事 cell 主办副行 */
    .st-ev__name { color: var(--clr-text); }
    .st-ev__host { font-size: 11px; color: var(--clr-text-3); margin-top: 2px; }
    .st-tbl tbody tr.st-row--link { cursor: pointer; }
    /* 查询关键词高亮 */
    mark.st-hl { background: rgba(168,85,247,0.30); color: var(--clr-text); border-radius: 2px; padding: 0 1px; }
    /* 查询热门示例 chip */
    .st-ex { display: flex; align-items: center; flex-wrap: wrap; gap: 7px; padding: 22px 4px 4px; }
    .st-ex__lb { font-size: 12px; color: var(--clr-text-3); }
    .st-ex__chip {
      font-family: var(--font-body); font-size: 12px; color: var(--clr-text-2);
      background: var(--clr-surface); border: 1px solid var(--clr-border-2); border-radius: 999px;
      padding: 4px 12px; cursor: pointer; transition: all 0.18s;
    }
    .st-ex__chip:hover { border-color: var(--clr-violet-dim); color: var(--clr-violet-light); }

    /* ── 查询控件 ── */
    .st-q { margin-top: var(--gap-md); display: flex; flex-direction: column; gap: 14px; }
    .st-q__tabs { display: flex; gap: 8px; flex-wrap: wrap; }
    .st-q__tab {
      font-family: var(--font-body); font-size: 12px; font-weight: 600; letter-spacing: 0.04em;
      color: var(--clr-text-2); background: var(--clr-surface); border: 1px solid var(--clr-border-2);
      border-radius: 999px; padding: 6px 16px; cursor: pointer; transition: all 0.18s;
    }
    .st-q__tab:hover { border-color: var(--clr-violet-dim); color: var(--clr-text); }
    .st-q__tab.is-active { background: rgba(168,85,247,0.14); border-color: var(--clr-violet); color: var(--clr-violet-light); }
    .st-q__bar { position: relative; max-width: 420px; }
    .st-q__input {
      width: 100%; font-family: var(--font-body); font-size: 14px; font-weight: 500; letter-spacing: 0.03em;
      color: var(--clr-text); background: var(--clr-surface); border: 1px solid var(--clr-border-2);
      border-radius: 4px; padding: 9px 34px 9px 14px; transition: border-color 0.2s;
    }
    .st-q__input:focus { outline: none; border-color: var(--clr-violet); caret-color: var(--clr-violet); }
    .st-q__input::placeholder { transition: opacity 0.2s; }
    .st-q__input:focus::placeholder { opacity: 0; }
    .st-q__ico { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); pointer-events: none; color: var(--clr-text-3); }
    .st-q__count { font-size: 12px; color: var(--clr-text-3); min-height: 16px; }
    .st-q__empty { font-size: 13px; color: var(--clr-text-3); padding: 28px 4px; }

    /* ── Notion 风格右侧目录 ── */
    .bvr-toc { position:fixed; right:14px; top:50%; transform:translateY(-50%); z-index:90; display:flex; flex-direction:column; align-items:flex-end; gap:0; opacity:0; visibility:hidden; transition:opacity 0.25s,visibility 0.25s; }
    .bvr-toc--visible { opacity:1; visibility:visible; }
    .bvr-toc__toggle { display:none; }
    .bvr-toc__list { display:flex; flex-direction:column; align-items:flex-end; gap:2px; padding:8px 10px; border-radius:8px; background:transparent; transition:background 0.25s, -webkit-backdrop-filter 0.25s, backdrop-filter 0.25s; }
    .bvr-toc:hover .bvr-toc__list { background:rgba(20,20,34,0.55); -webkit-backdrop-filter:blur(10px); backdrop-filter:blur(10px); }
    .bvr-toc__item { display:flex; align-items:center; justify-content:flex-end; gap:9px; cursor:pointer; user-select:none; padding:2px 0; }
    .bvr-toc__dash { flex:none; width:14px; height:2px; border-radius:2px; background:var(--clr-text-3); opacity:0.4; transition:width 0.25s, background 0.25s, opacity 0.25s; }
    .bvr-toc__label { order:-1; font-family:var(--font-body); font-size:10.5px; letter-spacing:0.01em; color:var(--clr-text-3); white-space:nowrap; max-width:0; opacity:0; transform:translateX(6px); overflow:hidden; transition:max-width 0.3s ease, opacity 0.25s, transform 0.3s ease, color 0.15s; }
    .bvr-toc:hover .bvr-toc__label { max-width:220px; opacity:1; transform:translateX(0); }
    .bvr-toc__item:hover .bvr-toc__dash { opacity:0.85; background:var(--clr-text-2); }
    .bvr-toc__item:hover .bvr-toc__label { color:var(--clr-text); }
    .bvr-toc__item--active .bvr-toc__dash { width:22px; background:var(--clr-violet-light); opacity:1; }
    .bvr-toc__item--active .bvr-toc__label { color:var(--clr-violet-light); }
    @media (max-width:768px) {
      .bvr-toc { right:20px; bottom:66px; top:auto; transform:none; z-index:210; gap:10px; }
      .bvr-toc__toggle { display:flex; align-items:center; justify-content:center; width:42px; height:42px; background:rgba(20,20,34,0.5); -webkit-backdrop-filter:blur(12px); backdrop-filter:blur(12px); border:1px solid var(--clr-border-2); border-radius:4px; color:rgba(192,132,252,0.65); cursor:pointer; padding:0; transition:color 0.25s,border-color 0.25s; }
      .bvr-toc__toggle svg { width:18px; height:18px; }
      .bvr-toc--open .bvr-toc__toggle { color:var(--clr-violet-light); border-color:var(--clr-violet-light); }
      .bvr-toc__list { display:none; gap:1px; min-width:152px; max-height:62vh; overflow-y:auto; background:rgba(20,20,34,0.72); -webkit-backdrop-filter:blur(14px); backdrop-filter:blur(14px); border:1px solid var(--clr-border-2); border-radius:6px; padding:6px; box-shadow:0 8px 28px rgba(0,0,0,0.4); }
      .bvr-toc:hover .bvr-toc__list { background:rgba(20,20,34,0.72); }
      .bvr-toc--open .bvr-toc__list { display:flex; }
      .bvr-toc__item { justify-content:flex-start; gap:0; padding:9px 13px; border-radius:4px; }
      .bvr-toc__item:hover { background:rgba(255,255,255,0.04); }
      .bvr-toc__dash { display:none; }
      .bvr-toc__label { order:0; max-width:none; opacity:1; transform:none; overflow:visible; font-size:13px; }
      .bvr-toc__item--active { background:rgba(168,85,247,0.12); }
    }
  </style>
</head>
<body>
<div id="site-nav"></div>

<!-- ═══ HERO ═══ -->
<section class="st-hero">
  <div class="st-hero__glow" aria-hidden="true"></div>
  <div class="st-hero__grid" aria-hidden="true"></div>
  <div class="st-hero__watermark" aria-hidden="true">STATS</div>
  <div class="st-hero__inner section__inner">
    <a class="st-eyebrow fade-up" href="/barvision.html"><span>←</span><span>Barvision</span></a>
    <h1 class="st-title fade-up" style="transition-delay:0.1s;">Data <span class="ac">Center</span></h1>
    <p class="st-desc fade-up" style="transition-delay:0.2s;">Barvision 数据中心——历届成绩总览、大妈选送排行榜，以及按成员 / 歌手 / 歌曲 / 语种的大数据查询。</p>
    <div class="fade-up" style="transition-delay:0.28s;"><span class="st-through" id="stThrough">数据截至第 15 届</span></div>
  </div>
</section>

<!-- ═══ 历届成绩总览 ═══ -->
<section class="section section--bordered" id="overview" style="scroll-margin-top:calc(var(--nav-h) - 2px)">
  <div class="section__inner">
    <p class="section-label fade-up">历届成绩总览</p>
    <h2 class="section__title fade-up" style="transition-delay:0.1s;font-size:clamp(18px,2.4vw,36px);">Editions <span class="ac">Overview</span></h2>
    <p class="st-sec__sub fade-up" style="transition-delay:0.15s;">第 1–15 届一览。点击届号进入该届完整赛果详情页。</p>
    <div id="stOverview" class="fade-up" style="transition-delay:0.2s;"></div>
  </div>
</section>

<!-- ═══ 大妈选送排行榜 ═══ -->
<section class="section section--bordered" id="ranking" style="scroll-margin-top:calc(var(--nav-h) - 2px)">
  <div class="section__inner">
    <p class="section-label fade-up">大妈选送排行榜</p>
    <h2 class="section__title fade-up" style="transition-delay:0.1s;font-size:clamp(18px,2.4vw,36px);">Member <span class="ac">Leaderboard</span></h2>
    <p class="st-sec__sub fade-up" style="transition-delay:0.15s;">点击表头排序。混淆曲不计正式成绩；合报单曲计入双方；匿名选送不列入排行。</p>
    <div id="stRanking" class="fade-up" style="transition-delay:0.2s;"></div>
  </div>
</section>

<!-- ═══ 大数据查询 ═══ -->
<section class="section section--bordered" id="query" style="scroll-margin-top:calc(var(--nav-h) - 2px)">
  <div class="section__inner">
    <p class="section-label fade-up">大数据查询</p>
    <h2 class="section__title fade-up" style="transition-delay:0.1s;font-size:clamp(18px,2.4vw,36px);">Big <span class="ac">Query</span></h2>
    <p class="st-sec__sub fade-up" style="transition-delay:0.15s;">检索全部 <span id="stTotal">—</span> 首历届参赛单曲。切换维度后输入关键词即可查询。</p>
    <div class="st-q fade-up" style="transition-delay:0.2s;">
      <div class="st-q__tabs" id="stTabs">
        <button class="st-q__tab is-active" data-dim="song">歌曲</button>
        <button class="st-q__tab" data-dim="artist">歌手</button>
        <button class="st-q__tab" data-dim="member">成员</button>
        <button class="st-q__tab" data-dim="language">语种</button>
      </div>
      <div class="st-q__bar">
        <input type="text" class="st-q__input" id="stInput" placeholder="输入歌曲名……" autocomplete="off" />
        <span class="st-q__ico"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg></span>
      </div>
      <div class="st-q__count" id="stCount"></div>
    </div>
    <div id="stResults"></div>
  </div>
</section>

<div id="site-footer"></div>
<script src="/scripts/nav.js"></script>
<script>
  function esc(s) { return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  var STATS = null;

  function memLink(id, fallback) {
    var info = (STATS && STATS.members[String(id)]) || null;
    var nick = (info && info.nickname) || fallback || String(id);
    if (!info || String(id) === '0' || !info.handle || info.handle === nick)
      return '<span style="color:var(--clr-text-2);">' + esc(nick) + '</span>';
    return '<a class="member" href="/member/' + id + '.html" data-nickname="' + esc(nick) + '">@' + esc(info.handle) + '</a>';
  }
  /* 选送者（合报含多 id），按昵称串拆链接 */
  function whoLinks(ids, nick) {
    ids = ids || [];
    if (!ids.length) return esc(nick || '');
    return ids.map(function (i) { return memLink(i); }).join('<span style="opacity:0.35"> / </span>');
  }
  /* 详情页路径（#165）：2023+ → /barvision/<年>.html；2019–2020 → /barvision/<年>/<两位届号>.html */
  function edHref(year, no) {
    return year >= 2023 ? '/barvision/' + year + '.html'
      : '/barvision/' + year + '/' + String(no).padStart(2, '0') + '.html';
  }

  /* ── 历届成绩总览 ── */
  function nick2id(nick) {
    if (!nick) return null;
    for (var sid in STATS.members) if (STATS.members[sid].nickname === nick) return sid;
    return null;
  }
  function buildOverview(ov) {
    var rows = ov.map(function (o) {
      var champs = o.champions.map(function (c) {
        return (c.venue ? '<span class="st-muted">' + esc(c.venue.replace('组', '')) + '</span> ' : '') + whoLinks(c.ids, c.nickname);
      }).join('<span class="st-muted"> · </span>');
      var hostId = nick2id(o.host);
      var hostHtml = o.host ? '<div class="st-ev__host">主办 ' + (hostId ? memLink(hostId, o.host) : esc(o.host)) + '</div>' : '';
      var href = edHref(o.year, o.edition_no);
      return '<tr class="st-row--link" data-href="' + href + '">' +
        '<td><a class="st-no" href="' + href + '" style="text-decoration:none;">' + o.edition_no + '</a></td>' +
        '<td class="ctr st-muted">' + o.year + '</td>' +
        '<td><span class="st-ev__name">' + esc(o.edition_name) + '</span>' + hostHtml + '</td>' +
        '<td><span class="st-fmt">' + (o.format === 'annual' ? '年度制' : '分组制') + '</span></td>' +
        '<td class="num">' + o.members + '</td>' +
        '<td class="num">' + o.songs + '</td>' +
        '<td>' + champs + '</td></tr>';
    }).join('');
    document.getElementById('stOverview').innerHTML =
      '<div class="st-wrap"><table class="st-tbl"><thead><tr>' +
      '<th>届</th><th class="ctr">年份</th><th>赛事</th><th>赛制</th>' +
      '<th class="num">成员</th><th class="num">曲目</th><th>冠军</th>' +
      '</tr></thead><tbody>' + rows + '</tbody></table></div>';
    // 整行点击进详情页（点击成员/届号链接除外）
    document.querySelectorAll('#stOverview tr.st-row--link').forEach(function (tr) {
      tr.addEventListener('click', function (e) {
        if (e.target.closest('a')) return;
        location.href = tr.dataset.href;
      });
    });
  }

  /* ── 选送排行榜（可排序） ── */
  var RANK_COLS = [
    { key: 'name', label: '成员', type: 'text' },
    { key: 'entries', label: '参与场数', type: 'num', desc: true },
    { key: 'top1', label: '夺冠', type: 'num', desc: true },
    { key: 'top3', label: '前三', type: 'num', desc: true },
    { key: 'top10', label: '前十', type: 'num', desc: true },
    { key: 'twelve', label: '12 分', type: 'num', desc: true },
    { key: 'avg', label: '平均名次', type: 'num', desc: false },
    { key: 'best', label: '最佳名次', type: 'num', desc: false },
  ];
  var RANK_DEFAULT = { key: 'entries', dir: 'desc' };  // 默认榜：参与场数降序
  var COUNT_KEYS = ['entries', 'top1', 'top3', 'top10', 'twelve'];  // 可画迷你条的计数列
  var rankData = [], rankSort = { key: 'entries', dir: 'desc' };

  function buildRanking() {
    rankData = Object.keys(STATS.members).filter(function (sid) {
      return sid !== '0' && (STATS.members[sid].overview.entries || 0) > 0;
    }).map(function (sid) {
      var m = STATS.members[sid], o = m.overview;
      return { id: m.id, name: m.nickname, entries: o.entries || 0, top1: o.top1 || 0, top3: o.top3 || 0,
        top10: o.top10 || 0, twelve: o.twelve || 0, avg: o.avg, best: o.best };
    });
    renderRanking();
  }
  function renderRanking() {
    var col = RANK_COLS.find(function (c) { return c.key === rankSort.key; });
    var dir = rankSort.dir === 'desc' ? -1 : 1;
    rankData.sort(function (a, b) {
      if (col.type === 'text') return a.name.localeCompare(b.name, 'zh') * dir;
      var av = a[col.key], bv = b[col.key];
      if (av == null) return 1; if (bv == null) return -1;
      if (av === bv) return (b.entries - a.entries);  // 次级稳定：参与场数降序
      return (av - bv) * dir;
    });
    // 迷你条：仅当排序列为计数列时画，按该列最大值归一
    var barKey = COUNT_KEYS.indexOf(rankSort.key) > -1 ? rankSort.key : null;
    var barMax = barKey ? Math.max.apply(null, rankData.map(function (r) { return r[barKey] || 0; })) || 1 : 1;

    var head = '<tr><th class="ctr">#</th>' + RANK_COLS.map(function (c) {
      var cls = (c.type === 'num' ? 'num ' : '') + 'sortable' + (c.key === rankSort.key ? ' is-sorted' : '');
      var ar = c.key === rankSort.key ? (rankSort.dir === 'desc' ? '▼' : '▲') : '';
      return '<th class="' + cls + '" data-key="' + c.key + '">' + c.label + '<span class="st-sort-ar">' + ar + '</span></th>';
    }).join('') + '</tr>';
    var body = rankData.map(function (r, i) {
      var pos = i + 1, posCls = (pos <= 3) ? ' st-pos--' + pos : '';
      var bestCls = (r.best >= 1 && r.best <= 3) ? ' st-best--' + r.best : '';
      function cell(key, txt, extraCls) {
        var bar = (key === barKey) ? ' st-bar" style="--bar:' + Math.round((r[key] || 0) / barMax * 100) + '%' : '';
        return '<td class="num' + (extraCls || '') + bar + '"><span>' + txt + '</span></td>';
      }
      return '<tr>' +
        '<td class="st-pos' + posCls + '">' + pos + '</td>' +
        '<td>' + memLink(r.id, r.name) + '</td>' +
        cell('entries', r.entries) +
        cell('top1', r.top1, (r.top1 ? ' st-rk-medal--1' : ' st-muted')) +
        cell('top3', r.top3) +
        cell('top10', r.top10) +
        cell('twelve', r.twelve) +
        '<td class="num st-muted">' + (r.avg != null ? r.avg.toFixed(2) : '—') + '</td>' +
        '<td class="num' + bestCls + '">' + (r.best != null ? r.best : '—') + '</td></tr>';
    }).join('');
    document.getElementById('stRanking').innerHTML =
      '<div class="st-wrap"><table class="st-tbl"><thead>' + head + '</thead><tbody>' + body + '</tbody></table></div>';
    document.querySelectorAll('#stRanking th.sortable').forEach(function (th) {
      th.addEventListener('click', function () {
        var k = th.dataset.key;
        if (k === rankSort.key) {  // 三态：默认列两态切换；其他列 降 → 升 → 回默认榜
          if (k === RANK_DEFAULT.key) rankSort.dir = rankSort.dir === 'desc' ? 'asc' : 'desc';
          else if (rankSort.dir === 'desc') rankSort.dir = 'asc';
          else rankSort = { key: RANK_DEFAULT.key, dir: RANK_DEFAULT.dir };
        } else { rankSort = { key: k, dir: 'desc' }; }
        renderRanking();
      });
    });
  }

  /* ── 大数据查询 ── */
  var DIM = { song: '歌曲名', artist: '歌手', member: '成员', language: '语种' };
  var curDim = 'song', curQ = '';
  function matchEng(e) { return e.venue || e.match || '综合赛'; }
  /* 关键词高亮（仅对当前维度对应字段） */
  function hl(text) {
    var t = String(text == null ? '' : text);
    if (!curQ) return esc(t);
    var i = t.toLowerCase().indexOf(curQ);
    if (i < 0) return esc(t);
    return esc(t.slice(0, i)) + '<mark class="st-hl">' + esc(t.slice(i, i + curQ.length)) + '</mark>' + esc(t.slice(i + curQ.length));
  }
  /* 空查询时的热门示例 chip（按当前维度，歌曲维度不给——歌名多唯一） */
  function exampleChips() {
    var items = [];
    if (curDim === 'member') items = rankData.slice(0, 6).map(function (r) { return r.name; });
    else if (curDim === 'language') {
      var c = {};
      STATS.entries.forEach(function (e) { if (!e.is_shadow && e.language) e.language.split(/[ /、]+/).forEach(function (l) { if (l) c[l] = (c[l] || 0) + 1; }); });
      items = Object.keys(c).sort(function (a, b) { return c[b] - c[a]; }).slice(0, 10);
    } else if (curDim === 'artist') {
      var ca = {};
      STATS.entries.forEach(function (e) { if (e.artist) ca[e.artist] = (ca[e.artist] || 0) + 1; });
      items = Object.keys(ca).filter(function (a) { return ca[a] >= 2; }).sort(function (a, b) { return ca[b] - ca[a]; }).slice(0, 8);
    }
    if (!items.length) return '';
    return '<div class="st-ex"><span class="st-ex__lb">热门：</span>' +
      items.map(function (t) { return '<button class="st-ex__chip" data-q="' + esc(t) + '">' + esc(t) + '</button>'; }).join('') + '</div>';
  }
  function runQuery() {
    var q = document.getElementById('stInput').value.trim();
    curQ = q.toLowerCase();
    var resEl = document.getElementById('stResults'), cntEl = document.getElementById('stCount');
    if (!q) {
      resEl.innerHTML = '<div class="st-q__empty">输入关键词，按「' + DIM[curDim] + '」检索历届参赛单曲。</div>' + exampleChips();
      cntEl.textContent = '';
      resEl.querySelectorAll('.st-ex__chip').forEach(function (b) {
        b.addEventListener('click', function () { var inp = document.getElementById('stInput'); inp.value = b.dataset.q; inp.focus(); runQuery(); });
      });
      return;
    }
    var hits = STATS.entries.filter(function (e) { return String(e[curDim] || '').toLowerCase().indexOf(curQ) > -1; });
    // 排序：届号升序 → 名次升序（空名次置后）
    hits.sort(function (a, b) {
      if (a.edition_no !== b.edition_no) return a.edition_no - b.edition_no;
      return (a.rank == null ? 9999 : a.rank) - (b.rank == null ? 9999 : b.rank);
    });
    cntEl.textContent = '匹配 ' + hits.length + ' 条' + (hits.length > 300 ? '（显示前 300）' : '');
    if (!hits.length) { resEl.innerHTML = '<div class="st-q__empty">未找到匹配「' + esc(q) + '」的结果。</div>'; return; }
    var rows = hits.slice(0, 300).map(function (e) {
      var rk = e.rank != null ? e.rank : '—';
      var rkCls = (e.rank >= 1 && e.rank <= 3 && !e.is_shadow) ? ' st-best--' + e.rank : (e.is_shadow ? ' st-muted' : '');
      var art = curDim === 'artist' ? hl(e.artist) : esc(e.artist);
      var song = curDim === 'song' ? hl(e.song) : esc(e.song);
      var lang = curDim === 'language' ? hl(e.language || '—') : esc(e.language || '—');
      return '<tr' + (e.is_shadow ? ' style="opacity:0.7"' : '') + '>' +
        '<td><a class="st-badge" href="' + edHref(e.year, e.edition_no) + '" style="text-decoration:none;">第' + e.edition_no + '届</a></td>' +
        '<td><span class="st-badge">' + esc(matchEng(e)) + '</span></td>' +
        '<td>' + whoLinks(e.ids, e.member) + '</td>' +
        '<td class="st-song"><span class="art">' + art + '</span> — <span class="ttl">' + song + '</span>' +
          (e.is_shadow ? ' <span class="st-badge">混淆</span>' : '') + (e.joint ? ' <span class="st-badge">合报</span>' : '') + '</td>' +
        '<td class="st-muted">' + lang + '</td>' +
        '<td class="ctr' + rkCls + '">' + rk + '</td>' +
        '<td class="num">' + (e.score != null ? Math.round(e.score) : '—') + '</td></tr>';
    }).join('');
    resEl.innerHTML = '<div class="st-wrap"><table class="st-tbl"><thead><tr>' +
      '<th>届</th><th>场次</th><th>选送者</th><th>参赛作品</th><th>语种</th><th class="ctr">名次</th><th class="num">总分</th>' +
      '</tr></thead><tbody>' + rows + '</tbody></table></div>';
  }

  /* ── load + render ── */
  (async function () {
    try { STATS = await fetch('/data/barvision/bv-stats.json').then(function (r) { return r.json(); }); }
    catch (e) { console.error('BV Stats: data load failed', e); return; }

    if (STATS.data_through) document.getElementById('stThrough').textContent = '数据截至第 ' + STATS.data_through + ' 届';
    document.getElementById('stTotal').textContent = STATS.entries.length;

    buildOverview(STATS.overview);
    buildRanking();
    runQuery();

    document.querySelectorAll('#stTabs .st-q__tab').forEach(function (t) {
      t.addEventListener('click', function () {
        document.querySelectorAll('#stTabs .st-q__tab').forEach(function (x) { x.classList.toggle('is-active', x === t); });
        curDim = t.dataset.dim;
        document.getElementById('stInput').placeholder = '输入' + DIM[curDim] + '……';
        runQuery();
      });
    });
    var inp = document.getElementById('stInput'), timer = null;
    inp.addEventListener('input', function () { clearTimeout(timer); timer = setTimeout(runQuery, 140); });

    function clearDelayAfterAnim(el) { var ms = (parseFloat(el.style.transitionDelay) || 0) * 1000 + 250; setTimeout(function () { el.style.transitionDelay = '0s'; }, ms); }
    if ('IntersectionObserver' in window) {
      var fo = new IntersectionObserver(function (entries) {
        entries.forEach(function (e) { if (e.isIntersecting) { e.target.classList.add('visible'); fo.unobserve(e.target); clearDelayAfterAnim(e.target); } });
      }, { threshold: 0.06 });
      document.querySelectorAll('.fade-up').forEach(function (el) { fo.observe(el); });
    } else { document.querySelectorAll('.fade-up').forEach(function (el) { el.classList.add('visible'); }); }
  })();

  /* ── Notion 风格右侧目录 ── */
  (function () {
    var ITEMS = [['overview', '历届成绩总览'], ['ranking', '大妈选送排行榜'], ['query', '大数据查询']];
    var ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 6h12M8 12h12M8 18h12"/><circle cx="4" cy="6" r="1"/><circle cx="4" cy="12" r="1"/><circle cx="4" cy="18" r="1"/></svg>';
    var nav = document.createElement('nav');
    nav.className = 'bvr-toc'; nav.setAttribute('aria-label', '页内目录');
    nav.innerHTML = '<div class="bvr-toc__list">' + ITEMS.map(function (it) {
      return '<div class="bvr-toc__item" data-target="' + it[0] + '"><span class="bvr-toc__dash"></span><span class="bvr-toc__label">' + it[1] + '</span></div>';
    }).join('') + '</div><button class="bvr-toc__toggle" type="button" aria-label="页内目录">' + ICON + '</button>';
    document.body.appendChild(nav);
    var toggle = nav.querySelector('.bvr-toc__toggle');
    toggle.addEventListener('click', function (e) { e.stopPropagation(); nav.classList.toggle('bvr-toc--open'); });
    document.addEventListener('click', function (e) { if (!nav.contains(e.target)) nav.classList.remove('bvr-toc--open'); });
    var els = Array.prototype.slice.call(nav.querySelectorAll('.bvr-toc__item'));
    var navH = 72, suppress = false, timer = null;
    function updateVisible() { nav.classList.toggle('bvr-toc--visible', window.scrollY > 300); }
    updateVisible();
    window.addEventListener('scroll', function () { updateVisible(); if (suppress) { clearTimeout(timer); timer = setTimeout(function () { suppress = false; }, 200); } }, { passive: true });
    var obs = new IntersectionObserver(function (entries) {
      if (suppress) return;
      entries.forEach(function (e) { if (e.isIntersecting) els.forEach(function (it) { it.classList.toggle('bvr-toc__item--active', it.dataset.target === e.target.id); }); });
    }, { rootMargin: '-' + navH + 'px 0px -55% 0px' });
    els.forEach(function (it) {
      var t = document.getElementById(it.dataset.target);
      if (t) obs.observe(t);
      it.addEventListener('click', function () {
        var t = document.getElementById(it.dataset.target); if (!t) return;
        nav.classList.remove('bvr-toc--open'); suppress = true; clearTimeout(timer);
        els.forEach(function (x) { x.classList.toggle('bvr-toc__item--active', x === it); });
        window.scrollTo({ top: t.getBoundingClientRect().top + window.scrollY - navH + 2, behavior: 'smooth' });
      });
    });
  })();
</script>
</body>

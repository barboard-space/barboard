<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script>if(sessionStorage.getItem('barboard_dev')!=='1')document.documentElement.style.visibility='hidden'</script>
  <title>Barvision Chongqing 2026 · 本届实时更新 | Barvision</title>
  <meta name="description" content="Barvision Chongqing 2026（第十六届，重庆）本届实时更新：报名情况（Candidates / Wildcards 名单）、各成员海选进展，以及赛程、投票方式、参赛要求与规则摘要。" />
  <link rel="icon" type="image/png" href="/assets/images/logo_center.png" />
  <link rel="stylesheet" href="/fonts.css" />
  <link rel="stylesheet" href="/style.css" />
  <style>
    /* ═══ Hero（复用 events.html 风格：主视觉海报 + 倒计时 + CTA） ═══ */
    .ev-hero { position: relative; padding: calc(var(--nav-h) + 64px) 0 80px; overflow: hidden; }
    .ev-hero__glow {
      position: absolute; inset: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 80% 70% at 60% 0%,  rgba(168,85,247,0.26) 0%, transparent 60%),
        radial-gradient(ellipse 50% 60% at 0%  100%, rgba(224,64,160,0.10) 0%, transparent 55%),
        radial-gradient(ellipse 35% 40% at 100% 50%, rgba(0,180,255,0.06)  0%, transparent 50%);
    }
    .ev-hero__poster {
      position: absolute; inset: 0; pointer-events: none;
      background-image: url('/assets/images/barvision/2026/poster.png');
      background-size: cover; background-position: center;
      opacity: 0; transition: opacity 0.55s ease;   /* 预解码完成后淡入，消除大图弹出/卡顿 */
    }
    .ev-hero__poster.loaded { opacity: 1; }
    .ev-hero__scrim {
      position: absolute; inset: 0; pointer-events: none;
      background:
        linear-gradient(90deg, rgba(8,8,18,0.88) 0%, rgba(8,8,18,0.72) 26%, rgba(8,8,18,0.18) 66%, rgba(8,8,18,0.05) 100%),
        linear-gradient(0deg, rgba(8,8,18,0.72) 0%, transparent 40%);
    }
    .ev-hero__inner { position: relative; z-index: 2; }
    .ev-hero__layout { max-width: 620px; margin-top: 12px; }
    .ev-eyebrow {
      font-size: 11px; font-weight: 600; letter-spacing: 0.28em;
      text-transform: uppercase; color: var(--clr-violet-light);
      text-shadow: 0 0 12px rgba(192,132,252,0.4);
      display: inline-flex; align-items: center; gap: 8px;
      margin-bottom: 24px; transition: color 0.2s;
    }
    .ev-eyebrow:hover { color: var(--clr-white); }
    .ev-title {
      font-family: var(--font-display); font-size: clamp(52px, 7vw, 96px);
      line-height: 0.95; letter-spacing: 0.02em; text-transform: uppercase; margin-bottom: 20px;
    }
    .ev-title .ev-accent { color: var(--clr-violet-light); }
    .ev-meta { display: flex; flex-wrap: wrap; align-items: center; gap: 0; margin-bottom: 20px; }
    .ev-meta-item {
      font-size: 12px; color: var(--clr-text-3);
      padding-right: 14px; margin-right: 14px;
      border-right: 1px solid var(--clr-border); white-space: nowrap;
    }
    .ev-meta-item:last-child { border-right: none; margin-right: 0; padding-right: 0; }
    .ev-hero__desc { font-size: 15px; color: var(--clr-text-2); line-height: 1.75; max-width: 500px; margin-bottom: 32px; }
    .ev-hero__cta { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 36px; }
    .ev-countdown {
      display: inline-flex; align-items: center; gap: 10px;
      background: var(--clr-surface); border: 1px solid var(--clr-border-2);
      border-radius: 6px; padding: 12px 20px 14px;
    }
    .ev-countdown__label { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--clr-text-3); white-space: nowrap; }
    .ev-countdown__digits { font-family: var(--font-display); font-size: clamp(26px, 3.2vw, 40px); color: var(--clr-pink-light); line-height: 1; }
    .ev-cd-unit { font-size: 12px; opacity: 0.55; margin: 0 1px; }
    @media (prefers-reduced-motion: no-preference) {
      @keyframes ev-hero-in { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
      .ev-eyebrow   { animation: ev-hero-in 0.55s cubic-bezier(0.22,1,0.36,1) both; }
      .ev-title     { animation: ev-hero-in 0.70s 0.08s cubic-bezier(0.22,1,0.36,1) both; }
      .ev-meta      { animation: ev-hero-in 0.50s 0.18s cubic-bezier(0.22,1,0.36,1) both; }
      .ev-hero__desc{ animation: ev-hero-in 0.55s 0.26s cubic-bezier(0.22,1,0.36,1) both; }
      .ev-hero__cta { animation: ev-hero-in 0.55s 0.35s cubic-bezier(0.22,1,0.36,1) both; }
      .ev-countdown { animation: ev-hero-in 0.55s 0.44s cubic-bezier(0.22,1,0.36,1) both; }
      .ev-updated   { animation: ev-hero-in 0.50s 0.53s cubic-bezier(0.22,1,0.36,1) both; }
    }
    @media (max-width: 768px) {
      .ev-hero { padding: calc(var(--nav-h) + 40px) 0 56px; }
      .ev-hero__desc { max-width: 100%; }
      /* 手机端：meta 标签一行一个、去竖分隔符 */
      .ev-meta { flex-direction: column; align-items: flex-start; gap: 5px; }
      .ev-meta-item { padding-right: 0; margin-right: 0; border-right: none; white-space: normal; }
      .ev-hero__cta .btn { flex: 1; min-width: calc(50% - 5px); justify-content: center; }
      .ev-hero__poster { background-image: url('/assets/images/barvision/2026/bg.png'); }  /* 手机端用无 logo 底图 */
    }
    @media (max-width: 480px) {
      .ev-hero { padding: calc(var(--nav-h) + 28px) 0 44px; }
      .ev-hero__cta { flex-direction: column; }
      .ev-hero__cta .btn { width: 100%; justify-content: center; }
      .ev-countdown { display: flex; width: 100%; box-sizing: border-box; }
    }
  </style>
</head>
<body>
  <div id="site-nav"></div>

  <section class="ev-hero">
    <div class="ev-hero__poster" aria-hidden="true"></div>
    <div class="ev-hero__scrim" aria-hidden="true"></div>
    <div class="ev-hero__glow" aria-hidden="true"></div>
    <div class="section__inner ev-hero__inner">
      <div class="ev-hero__layout">
        <a href="/barvision/" class="ev-eyebrow"><span>←</span><span>Barvision</span></a>
        <h1 class="ev-title">Chongqing<br><span class="ev-accent">2026</span></h1>
        <div class="ev-meta">
          <span class="ev-meta-item">第十六届欧美流行歌曲个人榜吧歌曲大赛</span>
          <span class="ev-meta-item">重声交响 Echoing Confluence</span>
          <span class="ev-meta-item">主办：<a class="member" href="/member/7/" data-nickname="威妈">@williw_</a></span>
        </div>
        <p class="ev-hero__desc">
          Barvision Chongqing 2026 报名正在进行中。本页实时汇总本届报名情况与海选进展，并附赛程、投票方式与参赛规则。
        </p>
        <div class="ev-hero__cta">
          <a href="/barvision/2026/events/#submit" class="btn btn--primary">歌曲报名</a>
          <a href="#schedule" class="btn btn--outline">赛程安排</a>
        </div>
        <div class="ev-countdown" id="heroCountdownWrap">
          <span class="ev-countdown__label" id="heroCountdownLabel">距提交通道开启还有</span>
          <span class="ev-countdown__digits" id="heroCountdown">—</span>
        </div>
        <p class="ev-updated" style="margin-top:10px;font-size:11px;color:var(--clr-text-3);"><span style="font-family:var(--font-body);">本页上次更新于</span> <span style="font-family:var(--font-mono);">2026-06-26</span></p>
      </div>
    </div>
  </section>

  <div id="bvr-root"></div>
  <div id="site-footer"></div>

  <script>var EDITION_SRC = '/data/barvision/barvision-2026/regular-16.json';</script>
  <script src="/scripts/bv-results-render.js"></script>
  <script src="/scripts/nav.js"></script>
  <script>
    /* Hero 海报背景：预解码完成后淡入（消除大图弹出 / 主线程解码卡顿） */
    (function () {
      var el = document.querySelector('.ev-hero__poster');
      if (!el) return;
      var im = new Image();
      function done() { el.classList.add('loaded'); }
      im.onload = done; im.onerror = done;
      // 按视口预解码实际显示的底图：手机端 bg.png（无 logo）/ 桌面端 poster.png
      im.src = window.matchMedia('(max-width:768px)').matches
        ? '/assets/images/barvision/2026/bg.png' : '/assets/images/barvision/2026/poster.png';
      if (im.decode) { im.decode().then(done).catch(function () {}); }
    })();

    /* Hero 倒计时（与 events.html 同步：开启前→倒数开启 / 开启中→倒数关闭 / 关闭后→倒数半决赛+海选突围赛投票） */
    (function () {
      var OPEN_DATE  = new Date('2026-06-01T18:00:00+08:00');
      var CLOSE_DATE = new Date('2026-07-20T00:00:00+08:00');   // = 北京时间 7/19 24:00
      var VOTE1_DATE = new Date('2026-07-25T22:00:00+08:00');   // Semi-Final 1 + 海选突围赛投票开启
      function pad(n) { return String(n).padStart(2, '0'); }
      function fmtCountdown(diff) {
        if (diff <= 0) return '—';
        var d = Math.floor(diff / 86400000), h = Math.floor((diff % 86400000) / 3600000),
            m = Math.floor((diff % 3600000) / 60000), s = Math.floor((diff % 60000) / 1000);
        return d + '<span class="ev-cd-unit">天</span>' + pad(h) + '<span class="ev-cd-unit">时</span>' +
               pad(m) + '<span class="ev-cd-unit">分</span>' + pad(s) + '<span class="ev-cd-unit">秒</span>';
      }
      function tick() {
        var now = new Date(), diff = OPEN_DATE - now, isOpen = diff <= 0 && now <= CLOSE_DATE, isClosed = now > CLOSE_DATE;
        var el = document.getElementById('heroCountdown'), lbl = document.getElementById('heroCountdownLabel');
        if (!el) return;
        if (isClosed) {
          if (now < VOTE1_DATE) { lbl.textContent = '距 Semi-Final 1 和海选突围赛投票开启还有'; el.innerHTML = fmtCountdown(VOTE1_DATE - now); }
          else { lbl.textContent = 'Semi-Final 1 / 海选突围赛投票'; el.textContent = '投票进行中'; }
        } else if (isOpen) { lbl.textContent = '距提交通道关闭还有'; el.innerHTML = fmtCountdown(CLOSE_DATE - now); }
        else { lbl.textContent = '距提交通道开启还有'; el.innerHTML = fmtCountdown(diff); }
      }
      tick(); setInterval(tick, 1000);
    })();
  </script>
</body>
</html>

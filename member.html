<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Members · 成员名录 | Barboard</title>
  <meta name="description" content="Barboard 榜吧全体成员名录，包含 BarboardLab、村摇欧共体、Indienation 等小组成员信息。" />
  <link rel="icon" type="image/png" href="assets/images/logo_center.png" />
  <link rel="stylesheet" href="fonts.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ── Page hero ── */
    .ml-hero {
      padding: calc(var(--nav-h) + 48px) 0 40px;
      position: relative;
      overflow: hidden;
    }
    .ml-hero__glow {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 0%, rgba(168,85,247,0.14) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 80% 80%, rgba(0,180,255,0.06) 0%, transparent 55%);
      pointer-events: none;
    }
    .ml-hero__inner { position: relative; z-index: 1; }

    .ml-title {
      font-family: var(--font-display);
      font-size: clamp(56px, 8vw, 96px);
      line-height: 0.95;
      letter-spacing: 0.04em;
      color: var(--clr-text);
      margin-bottom: 12px;
    }
    .ml-title span { color: var(--clr-violet-light); }

    .ml-meta {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--clr-text-3);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 36px;
    }

    /* ── Filter tabs ── */
    .ml-filters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .ml-filter {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 7px 16px;
      border-radius: 4px;
      border: 1px solid var(--clr-border);
      background: transparent;
      color: var(--clr-text-2);
      cursor: pointer;
      transition: border-color 0.18s, color 0.18s, background 0.18s;
    }
    .ml-filter:hover { border-color: var(--clr-border-2); color: var(--clr-text); }
    .ml-filter.active { border-color: var(--clr-violet-light); color: var(--clr-violet-light); background: var(--clr-violet-dim); }
    .ml-filter[data-filter="bbl"].active   { border-color: var(--clr-accent); color: var(--clr-accent); background: var(--clr-accent-dim); }
    .ml-filter[data-filter="cun"].active   { border-color: rgba(212,168,50,0.6); color: var(--clr-gold-light); background: rgba(212,168,50,0.08); }
    .ml-filter[data-filter="indie"].active { border-color: var(--clr-pink-light); color: var(--clr-pink-light); background: var(--clr-pink-dim); }

    /* ── Grid ── */
    .ml-section {
      padding: 40px 0 80px;
    }
    .ml-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 12px;
    }

    /* ── Card ── */
    .ml-card {
      background: var(--clr-surface);
      border: 1px solid var(--clr-border);
      border-radius: 8px;
      padding: 18px 16px 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      text-decoration: none;
      transition: border-color 0.18s, background 0.18s, transform 0.18s;
      cursor: default;
    }
    .ml-card--link { cursor: pointer; }
    .ml-card--link:hover {
      border-color: var(--clr-border-2);
      background: var(--clr-surface-2);
      transform: translateY(-2px);
    }
    .ml-card.hidden { display: none; }

    .ml-card__nickname {
      font-family: var(--font-display);
      font-size: 26px;
      letter-spacing: 0.04em;
      line-height: 1;
      color: var(--clr-text);
    }
    .ml-card__handle {
      font-size: 11px;
      color: var(--clr-text-3);
      letter-spacing: 0.04em;
      min-height: 15px;
    }
    .ml-card__badges {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      min-height: 20px;
    }
    .ml-badge {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 2px 6px;
      border-radius: 3px;
      border: 1px solid currentColor;
    }
    .ml-badge--bbl   { color: var(--clr-accent);      background: var(--clr-accent-dim); }
    .ml-badge--cun   { color: var(--clr-gold-light);  background: rgba(212,168,50,0.08); }
    .ml-badge--indie { color: var(--clr-pink-light);  background: var(--clr-pink-dim); }

    .ml-card__foot {
      margin-top: 4px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .ml-card__mt {
      font-size: 10px;
      color: var(--clr-text-3);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 3px;
      transition: color 0.18s;
    }
    .ml-card__mt:hover { color: var(--clr-text-2); }

    /* counter */
    #mlCount {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--clr-text-3);
      margin-bottom: 16px;
      display: block;
    }

    @media (max-width: 600px) {
      .ml-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; }
      .ml-card { padding: 14px 12px 12px; }
      .ml-card__nickname { font-size: 22px; }
    }
  </style>
</head>

    function buildGrid(filter) {
      var grid = document.getElementById('mlGrid');
      var count = document.getElementById('mlCount');
      var visible = 0;

      grid.innerHTML = MEMBERS.map(function(m) {
        var nickname = m[0], handle = m[1], groups = m[2], mt = m[3], page = m[4];

        if (show) visible++;

        var badges = groups.map(function(g) {
          return '<span class="ml-badge ml-badge--' + g + '">' + BADGE_LABEL[g] + '</span>';

          ? '<a class="ml-card__mt" href="https://' + mt + '" target="_blank" rel="noopener">Musictrack' + EXT_SVG + '</a>'
          : '';

        var attrs = page ? ' href="' + page + '"' : '';
        var cls = 'ml-card' + (page ? ' ml-card--link' : '') + (show ? '' : ' hidden');

        return '<' + tag + ' class="' + cls + '"' + attrs + '>' +
          '<div class="ml-card__nickname">' + nickname + '</div>' +
          '<div class="ml-card__handle">' + (handle ? handle : '') + '</div>' +
          '<div class="ml-card__badges">' + badges + '</div>' +
          (foot ? '<div class="ml-card__foot">' + foot + '</div>' : '') +
          '</' + tag + '>';
      }).join('');

      var label = filter === 'all' ? '· ' + MEMBERS.length + ' 位成员'

      count.textContent = label;

        buildGrid(btn.dataset.filter);
      });
    });

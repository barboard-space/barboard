  <title>Members · 成员名录 | Barboard</title>
  <meta name="description" content="Barboard 榜吧全体成员名录，包含 BarboardLab、村摇欧共体、Indienation 等小组成员信息。" />
  <link rel="icon" type="image/png" href="assets/images/logo_center.png" />

  <style>
    /* ── Page hero ── */
    .ml-hero {
      padding: calc(var(--nav-h) + 48px) 0 40px;
      position: relative;
      overflow: hidden;
    }
    .ml-hero__glow {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 0%, rgba(168,85,247,0.14) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 80% 80%, rgba(0,180,255,0.06) 0%, transparent 55%);
      pointer-events: none;
    }
    .ml-hero__inner { position: relative; z-index: 1; }

    .ml-title {
      font-family: var(--font-display);
      font-size: clamp(56px, 8vw, 96px);
      line-height: 0.95;
      letter-spacing: 0.01em;
      color: #fff;
      margin-bottom: 36px;
    }

    .ml-meta {
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--clr-violet-light);
      text-shadow: 0 0 14px rgba(192,132,252,0.5);
      margin-bottom: 36px;
    }

    /* ── Filter tabs ── */
    .ml-filters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .ml-filter {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 6px 16px 8px 18px;
      border-radius: 4px;
      border: 1px solid var(--clr-border);
      background: transparent;
      color: var(--clr-text-2);
      cursor: pointer;
      transition: border-color 0.18s, color 0.18s, background 0.18s;
    }
    .ml-filter:hover { border-color: var(--clr-border-2); color: var(--clr-text); }
    .ml-filter.active                        { border-color: rgba(111,158,195,0.7); color: #6F9EC3; background: rgba(111,158,195,0.1); }
    .ml-filter[data-filter="bbl"].active    { border-color: var(--clr-violet-light); color: var(--clr-violet-light); background: var(--clr-violet-dim); }
    .ml-filter[data-filter="cun"].active    { border-color: rgba(200,145,55,0.7); color: #D49840; background: rgba(180,120,45,0.1); }
    .ml-filter[data-filter="indie"].active  { border-color: var(--clr-pink-light); color: var(--clr-pink-light); background: var(--clr-pink-dim); }

    /* ── Grid ── */
    .ml-section {
      padding: 40px 0 80px;
    }
    .ml-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 12px;
    }

    /* ── Card ── */
    .ml-card {
      background: var(--clr-surface);
      border: 1px solid var(--clr-border);
      border-radius: 8px;
      padding: 18px 16px 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      text-decoration: none;
      transition: border-color 0.18s, background 0.18s, transform 0.18s, box-shadow 0.18s;
      cursor: default;
    }
    .ml-card--link { cursor: pointer; }
    .ml-card:hover {
      border-color: var(--clr-violet);
      background: var(--clr-surface-2);
      transform: translateY(-2px);
      box-shadow: 0 0 0 1px rgba(168,85,247,0.25), 0 0 18px rgba(168,85,247,0.18), 0 6px 20px rgba(0,0,0,0.35);
    }
    .ml-card.hidden { display: none; }

    .ml-card__nickname {
      font-family: var(--font-display);
      font-size: 26px;
      letter-spacing: 0.04em;
      line-height: 1;
      color: var(--clr-text);
    }
    .ml-card__handle {
      font-size: 11px;
      color: var(--clr-text-3);
      letter-spacing: 0.04em;
      min-height: 15px;
    }
    .ml-card__badges {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      min-height: 20px;
    }
    .ml-badge {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 2px 6px;
      border-radius: 3px;
      border: 1px solid currentColor;
    }
    .ml-badge--bbl   { color: var(--clr-violet-light); background: var(--clr-violet-dim); }
    .ml-badge--cun   { color: #D49840;                background: rgba(180,120,45,0.1); }
    .ml-badge--indie { color: var(--clr-pink-light);  background: var(--clr-pink-dim); }

    .ml-card__foot {
      margin-top: 4px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .ml-card__mt {
      font-size: 11px;
      color: var(--clr-text-3);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 3px;
      transition: color 0.18s;
    }
    .ml-card__mt:hover { color: var(--clr-text-2); }

    /* counter */
    #mlCount {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--clr-text-3);
      margin-bottom: 16px;
      display: block;
    }

    @media (max-width: 600px) {
      .ml-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; }
      .ml-card { padding: 14px 12px 12px; }
      .ml-card__nickname { font-size: 22px; }
    }
  </style>

    var BUILT_PAGES = new Set([7]);

    var BADGE_LABEL = { bbl: 'BBL', cun: '村摇欧', indie: 'Indie' };

    function parseGroups(team) {
      var g = [];
      if (team.indexOf('BarboardLab') !== -1) g.push('bbl');
      if (team.indexOf('村摇欧共体') !== -1) g.push('cun');
      if (team.indexOf('Indienation') !== -1) g.push('indie');
      return g;
    }

    function parseCSVLine(line) {
      var fields = [], field = '', inQ = false;
      for (var i = 0; i < line.length; i++) {
        var c = line[i];
        if (c === '"') { inQ = !inQ; }
        else if (c === ',' && !inQ) { fields.push(field.trim()); field = ''; }
        else { field += c; }
      }
      fields.push(field.trim());
      return fields;
    }

    var allMembers = [];
    var currentFilter = 'all';

    function buildGrid(members, filter) {
      var grid = document.getElementById('mlGrid');
      var count = document.getElementById('mlCount');
      var visible = 0;

      grid.innerHTML = members.map(function(m) {
        var name = m[0], bId = m[1], groups = m[2], mtId = m[3], biliId = m[4], page = m[5];
        var show = filter === 'all' || groups.indexOf(filter) !== -1;
        if (show) visible++;

        var badges = groups.map(function(g) {
          return '<span class="ml-badge ml-badge--' + g + '">' + BADGE_LABEL[g] + '</span>';
        }).join('');

        var foot = '';
        if (biliId) foot += '<a class="ml-card__mt" href="https://space.bilibili.com/' + biliId + '/" target="_blank" rel="noopener" onclick="event.stopPropagation()">Bilibili</a>';
        if (mtId) foot += '<a class="ml-card__mt" href="https://musictrack.cn/chart/' + mtId + '/" target="_blank" rel="noopener" onclick="event.stopPropagation()">Musictrack</a>';

        var tag = 'div';
        var attrs = page ? ' onclick="location.href=\'' + page + '\'" tabindex="0" role="link"' : '';
        var cls = 'ml-card' + (page ? ' ml-card--link' : '') + (show ? '' : ' hidden');

        return '<' + tag + ' class="' + cls + '"' + attrs + '>' +
          '<div class="ml-card__nickname">' + name + '</div>' +
          '<div class="ml-card__handle">' + (bId ? '@' + bId : '') + '</div>' +
          '<div class="ml-card__badges">' + badges + '</div>' +
          (foot ? '<div class="ml-card__foot">' + foot + '</div>' : '') +
          '</' + tag + '>';
      }).join('');

      var label = filter === 'all' ? '· ' + members.length + ' 位成员'
                : '· 显示 ' + visible + ' / ' + members.length + ' 位';
      count.textContent = label;
    }

    document.querySelectorAll('.ml-filter').forEach(function(btn) {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.ml-filter').forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        buildGrid(allMembers, currentFilter);
      });
    });

    fetch('data/barboard_members.csv')
      .then(function(r) { return r.text(); })
      .then(function(text) {
        var lines = text.trim().split('\n');
        for (var i = 1; i < lines.length; i++) {
          var row = parseCSVLine(lines[i]);
          if (row.length < 2 || !row[1]) continue;
          var spaceId = parseInt(row[0]);
          var name = row[1];
          var bId = row[2] || '';
          var groups = parseGroups(row[3] || '');
          var biliRaw = row[4] ? row[4].split(',')[0].trim() : '';
          var biliId = biliRaw || null;
          var mtId = row[6] ? parseInt(row[6]) || null : null;
          var page = BUILT_PAGES.has(spaceId) ? 'member/' + spaceId + '.html' : null;
          allMembers.push([name, bId, groups, mtId, biliId, page]);
        }
        buildGrid(allMembers, currentFilter);
      });

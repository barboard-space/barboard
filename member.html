  <title>Members · 成员名录 | Barboard</title>
  <meta name="description" content="Barboard 榜吧全体成员名录，包含 BarboardLab、村摇欧共体、Indienation 等小组成员信息。" />

  <style>
    /* ── Page hero ── */
    .ml-hero {
      padding: calc(var(--nav-h) + 48px) 0 25px;
      position: relative;
      overflow: hidden;
    }
    .ml-hero__glow {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 0%, rgba(168,85,247,0.14) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 62%, rgba(0,180,255,0.04) 0%, transparent 75%);
      pointer-events: none;
    }
    .ml-hero__inner { position: relative; z-index: 1; }

    .ml-title {
      font-family: var(--font-display);
      font-size: clamp(56px, 8vw, 96px);
      line-height: 0.95;
      letter-spacing: 0.01em;
      color: #fff;
      margin-bottom: 36px;
    }

    .ml-meta {
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--clr-violet-light);
      text-shadow: 0 0 14px rgba(192,132,252,0.5);
      margin-bottom: 36px;
    }

    /* ── Filter tabs ── */
    .ml-filters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .ml-filter {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 6px 16px 8px 18px;
      border-radius: 4px;
      border: 1px solid var(--clr-border);
      background: transparent;
      color: var(--clr-text-2);
      cursor: pointer;
      transition: border-color 0.18s, color 0.18s, background 0.18s;
    }
    .ml-filter:hover { border-color: var(--clr-border-2); color: var(--clr-text); }
    .ml-filter.active                        { border-color: rgba(111,158,195,0.7); color: #6F9EC3; background: rgba(111,158,195,0.1); }
    .ml-filter[data-filter="bbl"].active    { border-color: var(--clr-violet-light); color: var(--clr-violet-light); background: var(--clr-violet-dim); }
    .ml-filter[data-filter="cun"].active    { border-color: rgba(200,145,55,0.7); color: #D49840; background: rgba(180,120,45,0.1); }
    .ml-filter[data-filter="indie"].active  { border-color: var(--clr-pink-light); color: var(--clr-pink-light); background: var(--clr-pink-dim); }

    .ml-search {
      margin-left: auto;
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.03em;
      padding: 6px 14px 8px 14px;
      border-radius: 4px;
      border: 1px solid var(--clr-border);
      background: transparent;
      color: var(--clr-text);
      outline: none;
      width: 180px;
      transition: border-color 0.18s, width 0.25s ease;
    }
    .ml-search::placeholder { color: var(--clr-text-3); font-weight: 400; transition: opacity 0.18s; }
    .ml-search:focus::placeholder { opacity: 0; }
    .ml-search:focus { border-color: var(--clr-violet); width: 220px; caret-color: var(--clr-violet); }

    /* ── Grid ── */
    .ml-section {
      padding: 25px 0 80px;
      min-height: 80vh;
    }
    .ml-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 8px;
    }

    /* ── Card ── */
    .ml-card {
      background: var(--clr-surface);
      border: 1px solid var(--clr-border);
      border-radius: 8px;
      padding: 18px 16px 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      text-decoration: none;
      transition: border-color 0.18s, background 0.18s, transform 0.18s, box-shadow 0.18s;
      cursor: default;
    }
    .ml-card--link { cursor: pointer; }
    .ml-card:hover {
      border-color: var(--clr-violet);
      background: var(--clr-surface-2);
      transform: translateY(-2px);
      box-shadow: 0 0 0 1px rgba(168,85,247,0.25), 0 0 18px rgba(168,85,247,0.18), 0 6px 20px rgba(0,0,0,0.35);
    }
    .ml-card.hidden { display: none; }

    .ml-card__nickname {
      font-family: var(--font-display);
      font-size: 26px;
      letter-spacing: 0.04em;
      line-height: 1;
      color: var(--clr-text);
    }
    .ml-card__handle {
      font-size: 11px;
      color: #a8a3c8;
      letter-spacing: 0.04em;
      min-height: 15px;
      margin-top: -2px;
    }
    .ml-card__badges {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      min-height: 20px;
      margin-top: 4px;
    }
    .ml-badge {
      font-family: var(--font-body);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 5px 5px 3px 6px;
      border-radius: 2px;
      white-space: nowrap;
      line-height: 1;
    }
    .ml-badge--bbl   { color: var(--clr-violet-light); background: var(--clr-violet-dim);    border: 1px solid rgba(192,132,252,0.4); }
    .ml-badge--cun   { color: #D49840;                 background: rgba(180,120,45,0.1);      border: 1px solid rgba(212,152,64,0.4); }
    .ml-badge--indie { color: var(--clr-pink-light);   background: var(--clr-pink-dim);       border: 1px solid rgba(240,96,184,0.4); }

    .ml-card__foot {
      margin-top: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .ml-card__sep {
      font-size: 11px;
      color: var(--clr-text-3);
      user-select: none;
    }
    .ml-card__mt {
      font-size: 11px;
      color: var(--clr-text-3);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 3px;
      transition: color 0.18s;
    }
    .ml-card__mt:hover { color: var(--clr-violet-light); }

    /* counter */
    #mlCount {
      display: flex;
      align-items: baseline;
      gap: 6px;
      margin-bottom: 16px;
      opacity: 0.85;
      transition: opacity 0.4s ease, transform 0.45s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .ml-count__num {
      font-family: var(--font-display);
      font-size: 42px;
      line-height: 1;
      color: var(--clr-text);
      letter-spacing: 0.02em;
      min-width: 3ch;
      text-align: right;
    }
    .ml-count__label {
      font-family: var(--font-body);
      font-size: 13px;
      color: var(--clr-text);
      letter-spacing: 0.06em;
    }

    @media (max-width: 600px) {
      .ml-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; }
      .ml-card { padding: 14px 12px 12px; }
      .ml-card__nickname { font-size: 22px; }
      .ml-search { margin-left: 0; width: 100%; }
      .ml-search:focus { width: 100%; }
    }

    /* ── Card entrance ── */
    @media (prefers-reduced-motion: no-preference) {
      .ml-card-enter {
        opacity: 0;
        transform: translateY(12px);
        transition: opacity 0.55s cubic-bezier(0.22, 1, 0.36, 1),
                    transform 0.55s cubic-bezier(0.22, 1, 0.36, 1);
      }
      .ml-card-enter.visible {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ── Hero entrance animations ── */
    @media (prefers-reduced-motion: no-preference) {
      @keyframes ml-hero-in {
        to { opacity: 1; transform: translateY(0); }
      }
      .ml-meta, .ml-title {
        opacity: 0;
        transform: translateY(20px);
        animation: ml-hero-in 0.55s ease forwards;
      }
      .ml-meta  { animation-delay: 0.05s; }
      .ml-title { animation-delay: 0.16s; }
      .ml-filters .ml-filter {
        opacity: 0;
        transform: translateY(14px);
        animation: ml-hero-in 0.45s ease forwards;
      }
      .ml-filters .ml-filter:nth-child(1) { animation-delay: 0.28s; }
      .ml-filters .ml-filter:nth-child(2) { animation-delay: 0.34s; }
      .ml-filters .ml-filter:nth-child(3) { animation-delay: 0.40s; }
      .ml-filters .ml-filter:nth-child(4) { animation-delay: 0.46s; }
      .ml-filters .ml-search {
        opacity: 0;
        transform: translateY(14px);
        animation: ml-hero-in 0.45s ease forwards;
        animation-delay: 0.52s;
      }
    }
  </style>
</head>

    var BUILT_PAGES = new Set([7]);

    var mlObserver = 'IntersectionObserver' in window
      ? new IntersectionObserver(function(entries) {
          entries.forEach(function(e) {
            if (e.isIntersecting) { e.target.classList.add('visible'); mlObserver.unobserve(e.target); }
          });
        }, { threshold: 0.05 })
      : null;

    var firstLoad = true;

    var _countAnimId = null;

    function animateCounterTo(el, from, to, onDone) {
      if (_countAnimId) { cancelAnimationFrame(_countAnimId); _countAnimId = null; }
      var dur = Math.min(480, 100 + Math.abs(to - from) * 5);
      var t0 = null;
      function tick(ts) {
        if (!t0) t0 = ts;
        var p = Math.min((ts - t0) / dur, 1);
        var e = 1 - Math.pow(1 - p, 3);
        el.textContent = Math.round(from + (to - from) * e);
        if (p < 1) { _countAnimId = requestAnimationFrame(tick); }
        else { el.textContent = to; _countAnimId = null; if (onDone) onDone(); }
      }
      _countAnimId = requestAnimationFrame(tick);
    }

    var BADGE_LABEL = { bbl: 'BBL', cun: '村摇欧', indie: 'Indie' };

    function parseGroups(team) {
      var g = [];
      if (team.indexOf('BarboardLab') !== -1) g.push('bbl');
      if (team.indexOf('村摇欧共体') !== -1) g.push('cun');
      if (team.indexOf('Indienation') !== -1) g.push('indie');
      return g;
    }

    function parseCSVLine(line) {
      var fields = [], field = '', inQ = false;
      for (var i = 0; i < line.length; i++) {
        var c = line[i];
        if (c === '"') { inQ = !inQ; }
        else if (c === ',' && !inQ) { fields.push(field.trim()); field = ''; }
        else { field += c; }
      }
      fields.push(field.trim());
      return fields;
    }

    var PINNED_NAMES = ['雨妈', '威妈', '羊妈', 'S妈'];

    function getMemberScore(m) {
      var s = 0;
      if (m[0]) s++; if (m[1]) s++; if (m[4]) s++; if (m[3]) s++;
      s += m[2].length;
      return s;
    }

    function getTeamPriority(groups) {
      var p = 0;
      if (groups.indexOf('bbl') !== -1) p += 4;
      if (groups.indexOf('cun') !== -1) p += 2;
      if (groups.indexOf('indie') !== -1) p += 1;
      return p;
    }

    function getRowScore(m) {
      var hasHandle = !!m[1], hasTeam = m[2].length > 0, hasFoot = !!(m[3] || m[4]);
      if (hasHandle && hasTeam && hasFoot) return 7;
      if (hasHandle && hasFoot)            return 6;
      if (hasHandle && hasTeam)            return 5;
      if (hasTeam   && hasFoot)            return 4;
      if (hasHandle)                       return 3;
      if (hasFoot)                         return 2;
      if (hasTeam)                         return 1;
      return 0;
    }

    function buildGrid(members, filter, search) {
      var grid = document.getElementById('mlGrid');
      var count = document.getElementById('mlCount');
      var visible = 0;
      var isFirst = firstLoad;
      if (firstLoad) firstLoad = false;
      if (isFirst) { count.style.transition = 'none'; count.style.opacity = '0'; count.style.transform = 'translateY(8px)'; }

      grid.innerHTML = members.map(function(m) {
        var name = m[0], bId = m[1], groups = m[2], mtId = m[3], biliId = m[4], page = m[5];
        var q = search ? search.toLowerCase() : '';
        var matchGroup = filter === 'all' || groups.indexOf(filter) !== -1;
        var matchSearch = !q || name.toLowerCase().indexOf(q) !== -1 || bId.toLowerCase().indexOf(q) !== -1;
        var show = matchGroup && matchSearch;
        if (show) visible++;

        var badges = groups.map(function(g) {
          return '<span class="ml-badge ml-badge--' + g + '">' + BADGE_LABEL[g] + '</span>';
        }).join('');

        var foot = '';
        if (biliId) foot += '<a class="ml-card__mt" href="https://space.bilibili.com/' + biliId + '/" target="_blank" rel="noopener" onclick="event.stopPropagation()">Bilibili</a>';
        if (biliId && mtId) foot += '<span class="ml-card__sep">·</span>';
        if (mtId) foot += '<a class="ml-card__mt" href="https://musictrack.cn/chart/' + mtId + '/" target="_blank" rel="noopener" onclick="event.stopPropagation()">Musictrack</a>';

        var attrs = page ? ' onclick="location.href=\'' + page + '\'" tabindex="0" role="link"' : '';
        var cls = 'ml-card ml-card-enter' + (page ? ' ml-card--link' : '') + (show ? '' : ' hidden');

        return '<div class="' + cls + '"' + attrs + '>' +
          '<div class="ml-card__nickname">' + name + '</div>' +
          '<div class="ml-card__handle">' + (bId ? '@' + bId : '') + '</div>' +
          (badges ? '<div class="ml-card__badges">' + badges + '</div>' : '') +
          (foot ? '<div class="ml-card__foot">' + foot + '</div>' : '') +
          '</div>';
      }).join('');

      var showAll = filter === 'all' && !search;
      var targetNum = showAll ? members.length : visible;
      var newLabelText = showAll ? '位成员' : '/ ' + members.length + ' 位成员';

      if (isFirst) {
        count.innerHTML = '<span class="ml-count__num">' + targetNum + '</span><span class="ml-count__label">' + newLabelText + '</span>';
        prevCountNum = targetNum;
        var _c = count;
        requestAnimationFrame(function() {
          requestAnimationFrame(function() {
            _c.style.transition = '';
            setTimeout(function() { _c.style.opacity = ''; _c.style.transform = ''; }, 550);
          });
        });
      } else {
        var numEl = count.querySelector('.ml-count__num');
        var labelEl = count.querySelector('.ml-count__label');
        animateCounterTo(numEl, prevCountNum, targetNum, null);
        if (labelEl && labelEl.textContent !== newLabelText) {
          var _nlt = newLabelText;
          labelEl.style.transition = 'opacity 0.12s ease, transform 0.14s ease';
          labelEl.style.opacity = '0';
          labelEl.style.transform = 'translateX(-10px)';
          setTimeout(function() {
            labelEl.textContent = _nlt;
            labelEl.style.transition = 'none';
            labelEl.style.transform = 'translateX(10px)';
            requestAnimationFrame(function() {
              requestAnimationFrame(function() {
                labelEl.style.transition = 'opacity 0.2s ease, transform 0.2s ease';
                labelEl.style.opacity = '1';
                labelEl.style.transform = 'translateX(0)';
                setTimeout(function() {
                  labelEl.style.transition = '';
                  labelEl.style.transform = '';
                  labelEl.style.opacity = '';
                }, 220);
              });
            });
          }, 140);
        }
        prevCountNum = targetNum;
      }

      // 卡片动画：getBoundingClientRect 判断首屏，首屏内延迟 850ms 再 observe；屏外立即 observe
      var vh = window.innerHeight;
      grid.querySelectorAll('.ml-card:not(.hidden)').forEach(function(card, i) {
        card.style.transitionDelay = ((i % 6) * 0.05).toFixed(2) + 's';
        if (!mlObserver) { card.classList.add('visible'); return; }
        if (isFirst && card.getBoundingClientRect().top < vh) {
          setTimeout(function() { mlObserver.observe(card); }, 850);
        } else {
          mlObserver.observe(card);
        }
      });
    }

    document.querySelectorAll('.ml-filter').forEach(function(btn) {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.ml-filter').forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        buildGrid(allMembers, currentFilter, currentSearch);
      });
    });

    document.getElementById('mlSearch').addEventListener('input', function() {
      currentSearch = this.value.trim();
      buildGrid(allMembers, currentFilter, currentSearch);
    });

    fetch('data/barboard_members.csv')
      .then(function(r) { return r.text(); })
      .then(function(text) {
        var lines = text.trim().split('\n');
        for (var i = 1; i < lines.length; i++) {
          var row = parseCSVLine(lines[i]);
          if (row.length < 2 || !row[1]) continue;
          var spaceId = parseInt(row[0]);
          var name = row[1];
          var bId = row[2] || '';
          var groups = parseGroups(row[3] || '');
          var biliRaw = row[4] ? row[4].split(',')[0].trim() : '';
          var biliId = biliRaw || null;
          var mtId = row[6] ? parseInt(row[6]) || null : null;
          var page = BUILT_PAGES.has(spaceId) ? 'member/' + spaceId + '.html' : null;
          allMembers.push([name, bId, groups, mtId, biliId, page]);
        }
        // 固定前四：雨妈-威妈-羊妈-S妈，其余按完善度得分排序
        var pinned = [];
        PINNED_NAMES.forEach(function(pName) {
          for (var j = 0; j < allMembers.length; j++) {
            if (allMembers[j][0] === pName) { pinned.push(allMembers[j]); break; }
          }
        });
        var rest = allMembers.filter(function(m) { return PINNED_NAMES.indexOf(m[0]) === -1; });
        rest.sort(function(a, b) {
          var rd = getRowScore(b) - getRowScore(a);
          if (rd !== 0) return rd;
          var sd = getMemberScore(b) - getMemberScore(a);
          if (sd !== 0) return sd;
          return getTeamPriority(b[2]) - getTeamPriority(a[2]);
        });
        allMembers = pinned.concat(rest);
        buildGrid(allMembers, currentFilter, currentSearch);
      });
  </script>
</body>
</html>

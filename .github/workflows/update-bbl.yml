name: Update BBL Chart Data

on:
  schedule:
    - cron: '0 16 * * 6'  # Saturday 16:00 UTC = Sunday 00:00 Beijing
    - cron: '0 4  * * 0'  # Sunday 04:00 UTC = Sunday 12:00 Beijing (backup)
  workflow_dispatch:       # Manual trigger

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch BBL data
        run: python scripts/fetch_bbl.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/bbl-latest.json
          git diff --staged --quiet && echo "No changes." || (
            git commit -m "chore: update BBL chart data [skip ci]" &&
            git push
          )
